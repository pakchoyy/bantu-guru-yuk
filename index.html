<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<title>Bantu Guru Yuk • Generator v93 ELITE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:'Segoe UI',sans-serif;
background:#eef2f7;
margin:0;
}
.header{
background:linear-gradient(90deg,#1b5e20,#2e7d32,#66bb6a);
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
font-weight:bold;
}
.container{
max-width:800px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
label{
font-weight:bold;
margin-top:12px;
display:block;
}
select,input,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}
textarea{
height:260px;
}
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
color:white;
font-size:15px;
cursor:pointer;
}
.generate{background:#4CAF50;}
.copy{background:#2196F3;}
.gemini{background:#673ab7;}
.gpt{background:#009688;}
.preview{
max-width:200px;
margin-top:10px;
display:none;
border-radius:10px;
}
.footer{
text-align:center;
margin-top:15px;
font-size:12px;
color:#777;
}
</style>

</head>

<body>

<div class="header">
<div>👩‍🏫 BANTU GURU YUK</div>
<div>ELITE</div>
</div>

<div class="container">

<label>Jenis Media</label> <select id="media">

<option>LKPD</option>
<option>Infografis</option>
<option>Poster</option>
<option>Flashcard</option>
<option>Lembar Mewarnai</option>
<option>Kartu Soal</option>
<option>Bahan Bacaan</option>
</select>

<label>Kelas</label> <select id="kelas">

<option>Umum</option>
<option>Kelas 1</option>
<option selected>Kelas 2</option>
<option>Kelas 3</option>
<option>Kelas 4</option>
<option>Kelas 5</option>
<option>Kelas 6</option>
</select>

<label>Mata Pelajaran</label> <select id="mapel">

<option>Umum</option>
<option>Matematika</option>
<option>Bahasa Indonesia</option>
<option>IPA</option>
<option>IPS</option>
<option>Pendidikan Pancasila</option>
<option>Pendidikan Agama</option>
<option>Bahasa Jawa</option>
<option>Bahasa Daerah</option>
<option>Tematik</option>
</select>

<label>Tema / Topik</label> <input id="topik" placeholder="contoh: Ramadan, Pancasila, Penjumlahan">

<label>Jumlah Soal</label> <select id="jumlah">

<option>5</option>
<option selected>10</option>
<option>15</option>
<option>20</option>
</select>

<label>Tingkat Kesulitan</label> <select id="level">

<option>Mudah</option>
<option selected>Sedang</option>
<option>Sulit</option>
</select>

<label>Gaya Ilustrasi</label> <select id="gaya" onchange="toggleUpload()">

<option>Cartoon Kids</option>
<option>3D Clay</option>
<option>Pixar Style</option>
<option>Disney Style</option>
<option>Anime Kids</option>
<option>Storybook Illustration</option>
<option>Kindergarten Cute Style</option>
<option>Crayon Drawing</option>
<option>Hand Drawn Kids</option>

<option value="upload">Upload Referensi Sendiri</option>

</select>

<div id="uploadBox" style="display:none">
<label>Upload Referensi</label>
<input type="file" id="ref">
<img id="preview" class="preview">
</div>

<button class="generate" onclick="generatePrompt()">
Generate Prompt
</button>

<textarea id="hasil"></textarea>

<button class="copy" onclick="copyPrompt()">
Copy Prompt
</button>

<button class="gemini" onclick="openGemini()">
Open Gemini
</button>

<button class="gpt" onclick="openGPT()">
Open ChatGPT
</button>

<div class="footer">
by pak.choyy / 2026
</div>

</div>

<script>

function toggleUpload(){
uploadBox.style.display=(gaya.value==="upload")?"block":"none";
}

ref.onchange=function(e){
preview.src=URL.createObjectURL(e.target.files[0]);
preview.style.display="block";
}

function generatePrompt(){

let media=mediaEl.value;
let kelas=kelasEl.value;
let mapel=mapelEl.value;
let topik=topikEl.value;
let jumlah=jumlahEl.value;
let level=levelEl.value;
let gaya=gayaEl.value;

let styleText=(gaya==="upload")
?"Match illustration style exactly with uploaded reference image."
:"Illustration style: "+gaya+".";

let prompt="";

if(media==="LKPD"){

prompt=`
Create LKPD worksheet for elementary school.

Subject: ${mapel}
Topic: ${topik}
Class: ${kelas}

Number of questions: ${jumlah}
Difficulty level: ${level}

Include identity section.

All text must be Indonesian.

Clear readable font.

${styleText}

A4 portrait 300 dpi print ready no watermark.
`;

}

else if(media==="Infografis"){

prompt=`
Create infographic for elementary school.

Topic: ${topik}
Subject: ${mapel}

Use simple Indonesian.

Include title and explanation.

${styleText}

Professional layout A4 portrait.
`;

}

else if(media==="Poster"){

prompt=`
Create educational poster.

Topic: ${topik}

Motivational Indonesian text.

${styleText}

Very attractive for children.

`;

}

else if(media==="Flashcard"){

prompt=`
Create flashcard.

Topic: ${topik}

One concept per card.

Large clear Indonesian text.

${styleText}

`;

}

else if(media==="Lembar Mewarnai"){

prompt=`
Create coloring page.

Topic: ${topik}

Black and white line art.

Thick outline.

No color.

Simple for kids.

${styleText}

A4 print ready.
`;

}

else{

prompt=`
Create educational material.

Topic: ${topik}

${styleText}

Indonesian language.

`;

}

hasil.value=prompt;

}

const mediaEl=media;
const kelasEl=kelas;
const mapelEl=mapel;
const topikEl=topik;
const jumlahEl=jumlah;
const levelEl=level;
const gayaEl=gaya;

function copyPrompt(){
navigator.clipboard.writeText(hasil.value);
alert("Prompt disalin");
}

function openGemini(){
window.open("https://gemini.google.com","_blank");
}

function openGPT(){
window.open("https://chat.openai.com","_blank");
}

</script>

</body>
</html>
