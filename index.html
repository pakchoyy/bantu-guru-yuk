<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<title>Bantu Guru Yuk</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#eef2f7;
margin:0;
}

.header{
background:linear-gradient(90deg,#2e7d32,#4caf50);
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.sub{
background:#66bb6a;
color:white;
padding:8px;
text-align:center;
}

.container{
max-width:700px;
margin:25px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

label{
font-weight:bold;
display:block;
margin-top:12px;
}

select,input,textarea{

width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;

}

textarea{

height:180px;

}

button{

width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:8px;
color:white;
font-size:15px;
cursor:pointer;

}

.generate{background:#4CAF50;}
.copy{background:#2196F3;}
.gemini{background:#673ab7;}
.gpt{background:#009688;}

.footer{
text-align:center;
margin-top:15px;
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<div class="header">
BANTU GURU YUK
</div>

<div class="sub">
Generator LKPD Profesional • by Pak Choy
</div>

<div class="container">

<label>Kelas</label>

<select id="kelas">
<option>Kelas 1 SD</option>
<option selected>Kelas 2 SD</option>
<option>Kelas 3 SD</option>
<option>Kelas 4 SD</option>
<option>Kelas 5 SD</option>
<option>Kelas 6 SD</option>
</select>

<label>Media</label>

<select id="media">
<option>Worksheet (LKPD)</option>
<option>Poster Edukasi</option>
<option>Flashcard</option>
<option>Lembar Mewarnai</option>
<option>Infografis</option>
</select>

<label>Gaya Ilustrasi</label>

<select id="gaya">
<option>Kartun Ceria</option>
<option>3D Clay</option>
<option>Flat Design</option>
<option>Komik Anak</option>
<option>Hitam Putih</option>
</select>

<label>Materi</label>

<input id="materi" placeholder="contoh: Penjumlahan 1-20">

<label>Ukuran</label>

<select id="ukuran">
<option>A4</option>
<option>A3</option>
</select>

<label>Orientasi</label>

<select id="orientasi">
<option>Portrait</option>
<option>Landscape</option>
</select>

<button class="generate" onclick="generatePrompt()">
Generate Prompt
</button>

<textarea id="hasil"></textarea>

<button class="copy" onclick="copyPrompt()">
Copy Prompt
</button>

<button class="gemini" onclick="openGemini()">
Buka Gemini
</button>

<button class="gpt" onclick="openGPT()">
Buka ChatGPT
</button>

<div class="footer">
v72 Stabil • No Bug
</div>

</div>

<script>



function generatePrompt(){

var kelas=document.getElementById("kelas").value;

var media=document.getElementById("media").value;

var gaya=document.getElementById("gaya").value;

var materi=document.getElementById("materi").value;

var ukuran=document.getElementById("ukuran").value;

var orientasi=document.getElementById("orientasi").value;



var prompt=

"Buatkan "+media+

" untuk siswa "+kelas+

" tentang '"+materi+"'. "+

"Gaya ilustrasi "+gaya+

". Bahasa sederhana. "+

"Ukuran "+ukuran+

" "+orientasi+

". Siap cetak. Tanpa watermark.";



document.getElementById("hasil").value=prompt;

}



function copyPrompt(){

var text=document.getElementById("hasil");

text.select();

document.execCommand("copy");

alert("Prompt disalin");

}



function openGemini(){

window.open("https://gemini.google.com");

}



function openGPT(){

window.open("https://chat.openai.com");

}



</script>

</body>
</html>
