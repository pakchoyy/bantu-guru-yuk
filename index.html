<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Generator Media Ajar SD</title><style>

body{
font-family:Arial;
padding:20px;
background:#f4f6f8;
}

label{
font-weight:bold;
}

select, textarea, button{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#4CAF50;
color:white;
border:none;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
max-width:500px;
}

.card{
cursor:pointer;
text-align:center;
padding:5px;
border:2px solid transparent;
border-radius:10px;
background:white;
}

.card img{
width:100%;
border-radius:8px;
}

.card:hover{
border:2px solid green;
}

.active{
border:2px solid red;
}

</style></head><body><h2>Generator Prompt Media Ajar SD</h2><label>Materi:</label>

<textarea
id="materi"
rows="4"
placeholder="Tulis materi dengan jelas agar hasil lebih akurat. Contoh: Siklus air kelas 2 SD"></textarea><label>Media:</label>

<select id="media"><option>Worksheet (LKPD)</option>
<option>Poster Edukasi</option>
<option>Infografis</option>
<option>Lembar Mewarnai</option></select><label>Style:</label>

<select id="style"><option value="Storybook">Storybook</option>
<option value="Cartoon Kids">Cartoon Kids</option>
<option value="Pixar Style">Pixar Style</option>
<option value="3D Clay">3D Clay</option>
<option value="Crayon">Crayon</option>
<option value="Comic">Comic</option>
<option value="Coloring Page">Mewarnai</option>
<option value="Upload Style">Upload Style Sendiri</option></select><div class="grid"><div onclick="pilihStyle('Storybook',this)" class="card">
<img src="storybook.png">
<div>Storybook</div>
</div><div onclick="pilihStyle('Cartoon Kids',this)" class="card">
<img src="cartoonkids.png">
<div>Cartoon</div>
</div><div onclick="pilihStyle('Pixar Style',this)" class="card">
<img src="pixar.png">
<div>Pixar</div>
</div><div onclick="pilihStyle('3D Clay',this)" class="card">
<img src="clay.png">
<div>Clay</div>
</div><div onclick="pilihStyle('Crayon',this)" class="card">
<img src="crayon.png">
<div>Crayon</div>
</div><div onclick="pilihStyle('Comic',this)" class="card">
<img src="comic.png">
<div>Comic</div>
</div><div onclick="pilihStyle('Coloring Page',this)" class="card">
<img src="blackwhite.png">
<div>Mewarnai</div>
</div></div><label>Upload Style:</label>

<input type="file" id="uploadStyle"><div id="preview"></div><label>Prompt:</label>

<textarea id="prompt" rows="10"></textarea><button onclick="generatePrompt()">Generate Prompt</button>

<script>


const styleMap={

"Storybook":`
storybook illustration
hand drawn
soft colors
children book illustration
warm atmosphere
`,

"Cartoon Kids":`
cartoon kids illustration
bright colors
simple shapes
clean outlines
`,

"Pixar Style":`
Pixar style 3D illustration
cinematic lighting
high detail
`,

"3D Clay":`
3D clay style
clay texture
soft shadows
`,

"Crayon":`
crayon drawing
hand drawn
kids style
`,

"Comic":`
comic book style
bold outline
`,

"Coloring Page":`
black and white coloring page
clean outline
no shading
`,

"Upload Style":`
follow reference image style
`

};



function pilihStyle(style,el){

document.getElementById("style").value=style;

document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));

el.classList.add("active");

generatePrompt();

}



document.getElementById("uploadStyle").onchange=function(){

const file=this.files[0];

const reader=new FileReader();

reader.onload=e=>{

document.getElementById("preview").innerHTML=
"<img src='"+e.target.result+"' width=100>";

};

reader.readAsDataURL(file);

document.getElementById("style").value="Upload Style";

generatePrompt();

};



function generatePrompt(){

const materi=document.getElementById("materi").value;

const media=document.getElementById("media").value;

const style=document.getElementById("style").value;

const prompt=

`Create ${media} untuk siswa SD

Materi:
${materi}

${styleMap[style]}

Bahasa Indonesia
print ready
300 dpi
no watermark`;

document.getElementById("prompt").value=prompt;

}



generatePrompt();


</script></body>
</html>
