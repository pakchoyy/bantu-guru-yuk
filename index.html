<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Bantu Guru V47</title><style>

body{
font-family:Arial;
background:#f3f4ff;
margin:0;
}

.header{
background:linear-gradient(135deg,#5b5bff,#8f5bff);
color:white;
padding:25px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
max-width:800px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input,select,button,textarea{

width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;

}

button{
background:#5b5bff;
color:white;
border:none;
font-weight:bold;
}

.copy{
background:#00a86b;
}

.ai{
background:#444;
}

canvas{

width:100%;
background:white;
border-radius:10px;

}

.download{

background:#007bff;

}

</style></head>
<body><div class="header">Bantu Guru V47 • Pak.Choyy

</div><div class="container"><div class="card"><input id="materi" placeholder="contoh: Penjumlahan 1-50"><select id="jumlah"><option value="5">5 Soal</option>
<option value="10">10 Soal</option>
<option value="15">15 Soal</option></select><button onclick="generatePrompt()">GENERATE PROMPT

</button><textarea id="prompt" rows="5"></textarea><button class="copy" onclick="copyPrompt()">SALIN PROMPT

</button><button class="ai" onclick="openChatGPT()">Generate via ChatGPT

</button><button class="ai" onclick="openGemini()">Generate via Gemini

</button><button class="ai" onclick="openBing()">Generate via Bing

</button></div><div class="card"><button onclick="generateLKPD()">GENERATE LKPD LANGSUNG

</button><canvas id="canvas" width="2480" height="3508"></canvas>

<button class="download" onclick="downloadLKPD()">DOWNLOAD A4

</button></div></div><script>


function generatePrompt(){

let materi=document.getElementById("materi").value;

let jumlah=document.getElementById("jumlah").value;

let text=

"Create an A4 LKPD for Grade 2 students about "+materi+

", total "+jumlah+

" questions, Indonesian language, kids friendly, clean layout, high quality, 300 dpi";

document.getElementById("prompt").value=text;

}



function copyPrompt(){

let text=document.getElementById("prompt");

text.select();

document.execCommand("copy");

alert("Prompt disalin");

}



function openChatGPT(){

window.open("https://chat.openai.com");

}



function openGemini(){

window.open("https://gemini.google.com");

}



function openBing(){

window.open("https://bing.com/images/create");

}



function generateLKPD(){


let materi=document.getElementById("materi").value;

let jumlah=parseInt(document.getElementById("jumlah").value);

let canvas=document.getElementById("canvas");

let ctx=canvas.getContext("2d");


ctx.fillStyle="white";

ctx.fillRect(0,0,2480,3508);


ctx.fillStyle="black";


ctx.font="bold 90px Arial";

ctx.fillText("LKPD Kelas 2",900,200);


ctx.font="60px Arial";

ctx.fillText("Materi: "+materi,200,350);

ctx.fillText("Nama: ____________________",200,500);

ctx.fillText("Tanggal: ____________________",200,600);


ctx.fillText("Jawablah:",200,800);


for(let i=1;i<=jumlah;i++){

ctx.fillText(i+". ________________________________",200,800+i*180);

}


ctx.font="40px Arial";

ctx.fillStyle="gray";

ctx.fillText("by Pak.Choyy",1800,3400);


}



function downloadLKPD(){

let canvas=document.getElementById("canvas");

let link=document.createElement("a");

link.download="LKPD-Kelas2.png";

link.href=canvas.toDataURL();

link.click();

}


</script></body>
</html>
