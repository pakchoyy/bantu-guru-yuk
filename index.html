<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Generator Prompt Media Ajar</title><style>

body{
font-family:Arial;
padding:20px;
background:#f4f6f8;
}

select, textarea, button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#4CAF50;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#45a049;
}

.styleimg{
width:70px;
cursor:pointer;
border-radius:8px;
border:2px solid transparent;
margin:3px;
}

.styleimg:hover{
border:2px solid green;
}

.styleactive{
border:2px solid red;
}

</style></head><body><h2>Generator Prompt Media Ajar SD</h2><label>Pilih Style:</label>

<select id="style"><option value="Storybook">Storybook</option>
<option value="Cartoon Kids">Cartoon Kids</option>
<option value="Pixar Style">Pixar Style</option>
<option value="3D Clay">3D Clay</option>
<option value="Crayon">Crayon</option>
<option value="Comic">Comic</option>
<option value="Coloring Page">Lembar Mewarnai</option>
<option value="Upload Style">Upload Style Sendiri</option></select><!-- GRID STYLE --><div><img src="storybook.png" onclick="pilihStyle('Storybook', this)" class="styleimg">
<img src="cartoonkids.png" onclick="pilihStyle('Cartoon Kids', this)" class="styleimg">
<img src="pixar.png" onclick="pilihStyle('Pixar Style', this)" class="styleimg">
<img src="clay.png" onclick="pilihStyle('3D Clay', this)" class="styleimg">
<img src="crayon.png" onclick="pilihStyle('Crayon', this)" class="styleimg">
<img src="comic.png" onclick="pilihStyle('Comic', this)" class="styleimg">
<img src="blackwhite.png" onclick="pilihStyle('Coloring Page', this)" class="styleimg"></div><br><label>Upload Style Sendiri:</label>

<input type="file" id="uploadStyle" accept="image/*"><div id="previewBox"></div><br><label>Prompt:</label>

<textarea id="prompt" rows="8"></textarea><button onclick="generatePrompt()">Generate Prompt</button>

<script>

function pilihStyle(styleName, element){

document.getElementById("style").value = styleName;

document.querySelectorAll(".styleimg").forEach(img => {

img.classList.remove("styleactive");

});

if(element){
element.classList.add("styleactive");
}

}



document.getElementById("uploadStyle").addEventListener("change", function(){

const file = this.files[0];

if(file){

document.getElementById("style").value = "Upload Style";

const reader = new FileReader();

reader.onload = function(e){

document.getElementById("previewBox").innerHTML =
'<p>Preview Style:</p><img src="'+e.target.result+'" style="width:100px;border-radius:8px;border:2px solid green;">';

};

reader.readAsDataURL(file);

}

});



function generatePrompt(){

let style = document.getElementById("style").value;

let prompt = "Create media pembelajaran untuk siswa SD dengan gaya ilustrasi " + style + ". Gunakan bahasa Indonesia, layout profesional, siap cetak, tanpa watermark.";

document.getElementById("prompt").value = prompt;

}

</script></body>
</html>
