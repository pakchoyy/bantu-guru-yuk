<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Bantu Guru Yuk</title><style>

body{
font-family:'Segoe UI',sans-serif;
background:#eef2f7;
margin:0;
}

/* HEADER */

.header{
background:linear-gradient(90deg,#1b5e20,#2e7d32,#66bb6a);
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.trial-badge{
background:#ffeb3b;
color:#1b5e20;
padding:4px 10px;
font-size:11px;
font-weight:bold;
border-radius:12px;
}

/* SUB */

.sub{
background:#66bb6a;
color:white;
padding:6px;
text-align:center;
font-size:13px;
}

/* CONTAINER */

.container{
max-width:700px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
}

/* FORM */

label{
font-weight:bold;
display:block;
margin-top:12px;
}

select,textarea,button{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
}

textarea{
min-height:140px;
resize:none;
overflow:hidden;
}

button{
border:none;
color:white;
cursor:pointer;
}

.generate{background:#4CAF50;}
.copy{background:#2196F3;}
.gpt{background:#009688;}
.gemini{background:#673ab7;}

/* INFO BOX */

.info{
margin-top:8px;
background:#e8f5e9;
border-left:4px solid #4CAF50;
padding:10px;
font-size:13px;
color:#2e7d32;
}

/* FOOTER */

.footer{
background:linear-gradient(90deg,#1b5e20,#2e7d32,#66bb6a);
color:white;
padding:22px;
text-align:center;
margin-top:30px;
}

.footer a{
color:white;
font-size:20px;
font-weight:bold;
text-decoration:none;
}

</style></head><body><!-- HEADER --><div class="header"><div>👩‍🏫 BANTU GURU YUK</div><div class="trial-badge">🧪 TRIAL VERSION</div></div><div class="sub">
AI Worksheet Generator
</div><!-- FORM --><div class="container"><label>Jenis Media</label>

<select id="media" onchange="updateMediaInfo()"><option value="LKPD">LKPD</option><option value="Poster">Poster</option><option value="Infografis">Infografis</option><option value="Flashcard">Flashcard</option><option value="Lembar Mewarnai">Lembar Mewarnai</option><option value="Bahan Bacaan">Bahan Bacaan</option></select><div id="mediaInfo" class="info">
📄 Lembar Kerja Peserta Didik
</div><label>Mata Pelajaran</label>

<select id="mapel"><option>Umum</option>
<option>Matematika</option>
<option>Bahasa Indonesia</option>
<option>IPAS</option></select><label>Kelas</label>

<select id="kelas"><option>Umum</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option></select><label>Materi</label>

<textarea id="materi"
placeholder="Tulis materi dengan jelas"></textarea><label>Jumlah Soal</label>

<select id="jumlah"><option>10</option>
<option>5</option>
<option>15</option></select><label>Ukuran</label>

<select id="ukuran"><option>F4</option>
<option>A4</option>
<option>A3</option>
<option>A5</option></select><label>Orientasi</label>

<select id="orientasi"><option>Portrait</option>
<option>Landscape</option></select><label>Gaya</label>

<select id="gaya"><option>Cartoon Kids</option>
<option>Storybook Illustration</option>
<option>Flat Vector Kids</option>
<option>Black and White Outline</option></select><button class="generate" onclick="generatePrompt()">
Generate Prompt
</button><textarea id="hasil"></textarea><button class="copy" onclick="copyPrompt()">
Copy Prompt
</button><button class="gpt"
onclick="window.open('https://chat.openai.com')">

Open ChatGPT

</button><button class="gemini"
onclick="window.open('https://gemini.google.com')">

Open Gemini

</button></div><!-- FOOTER --><div class="footer"><a href="https://www.tiktok.com/@pak.choyy" target="_blank">🎵 @pak.choyy

</a><div style="font-size:12px">
Free and Paid Worksheet
</div></div><!-- SCRIPT --><script>

/* AUTO EXPAND */

materi.oninput=function(){

this.style.height="auto";

this.style.height=this.scrollHeight+"px";

}


/* MEDIA INFO */

function updateMediaInfo(){

let info={

LKPD:"📄 Lembar Kerja Peserta Didik",

Poster:"🖼️ Poster",

Infografis:"📊 Infografis",

Flashcard:"🗂️ Flashcard",

"Lembar Mewarnai":"🎨 Mewarnai",

"Bahan Bacaan":"📚 Bacaan"

};

mediaInfo.innerText=info[media.value];

}


/* GENERATE */

function generatePrompt(){

hasil.value=

"Create "+media.value+"\n"+

"Subject: "+mapel.value+"\n"+

"Class: "+kelas.value+"\n"+

"Topic: "+materi.value+"\n"+

"Questions: "+jumlah.value+"\n"+

"Paper size: "+ukuran.value+"\n"+

"Orientation: "+orientasi.value+"\n"+

"Style: "+gaya.value+"\n"+

"Print ready\n300 DPI\nNo watermark";

}


/* COPY */

function copyPrompt(){

navigator.clipboard.writeText(hasil.value);

alert("Copied");

}

</script></body>
</html>
