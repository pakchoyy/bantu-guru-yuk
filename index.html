<meta name="theme-color" content="#2f9e44">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:#eef2f7;
}

/* INSTALL POPUP */

.install-popup{
position:fixed;
top:-100px;
left:0;
right:0;
background:#2f9e44;
color:#fff;
padding:14px;
text-align:center;
transition:.4s;
z-index:9999;
}

.install-popup.show{
top:0;
}

/* HEADER */

.header{
background:linear-gradient(90deg,#6cc6a6,#4dabf7);
color:#fff;
padding:20px;
text-align:center;
}

.header img{
width:60px;
}

/* NAVBAR */

.navbar{
background:#fff;
padding:12px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.navbar a{
margin:0 12px;
font-weight:bold;
cursor:pointer;
position:relative;
}

.navbar a.active::after{
content:"";
position:absolute;
left:0;
bottom:-2px;
width:100%;
height:6px;
background:yellow;
z-index:-1;
}

/* CONTAINER */

.container{
max-width:760px;
margin:auto;
background:#fff;
padding:24px;
border-radius:14px;
margin-top:20px;
}

label{
font-weight:bold;
display:block;
margin-top:14px;
}

select,input,textarea{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

textarea{
height:140px;
}

.keterangan{
font-size:12px;
color:#666;
}

/* BUTTON */

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:8px;
color:#fff;
cursor:pointer;
}

.generate{background:#2f9e44;}
.copy{background:#1971c2;}
.gpt{background:#0b7285;}
.gemini{background:#6741d9;}

.notif{
display:none;
background:#2f9e44;
color:#fff;
padding:10px;
margin-top:10px;
border-radius:8px;
text-align:center;
}

.section{display:none;}
.active{display:block;}

.footer{
margin-top:30px;
background:linear-gradient(90deg,#6cc6a6,#4dabf7);
padding:18px;
text-align:center;
color:#fff;
}

</style>

</head>

<body>

<option>Matematika</option>

<option>IPAS</option>

<option>Umum</option>

</select>


<label>Jenis Media</label>

<select id="media" onchange="autoStyle();toggleLKPD()">

<option>LKPD</option>

</select>


<div id="lkpdBox">


<label>Jenis LKPD</label>

<select id="jenisLKPD">

<option>Pilihan Ganda</option>

<option>Menjodohkan</option>

</select>


<label>Mode</label>

<select id="mode">

<option>Siswa</option>

<option>Guru (dengan kunci jawaban)</option>

</select>


<label>Jumlah Soal</label>

<select id="jumlah" onchange="cekJumlahCustom()">

<option>5</option>

<option selected>10</option>

<option>15</option>

<option>20</option>

<option value="custom">Isi Sendiri</option>

</select>


<input id="jumlahCustom"
placeholder="Masukkan jumlah soal"
style="display:none">

</div>


<label>Materi</label>

<textarea id="materi"></textarea>


<div class="keterangan">

Materi otomatis dibantu sesuai mapel

</div>


<label>Gaya Ilustrasi</label>

<select id="gaya">

<option value="Cartoon Kids">Cartoon Kids</option>

<option value="Storybook">Storybook</option>

<option value="Comic">Comic</option>

<option value="Crayon">Crayon</option>

<option value="Watercolor">Watercolor</option>

<option value="Flat Vector">Flat Vector</option>

<option value="3D Clay">3D Clay</option>

<option value="Pixar Style">Pixar Style</option>

<option value="Black White">Black White</option>

</select>


<button class="generate" onclick="generatePrompt()">

Generate Prompt

</button>

<button class="gpt" onclick="openGPT()">

</div>

<div id="visitor">

Pengunjung ke: loading...

</div>

</div>


<script>

/* NAV */

function show(x,e){

document.querySelectorAll(".section")
.forEach(el=>el.classList.remove("active"))

document.querySelectorAll(".navbar a")
.forEach(el=>el.classList.remove("active"))

document.getElementById(x).classList.add("active")

e.target.classList.add("active")

}


/* CUSTOM */

function cekJumlahCustom(){

jumlahCustom.style.display=
jumlah.value=="custom"?"block":"none"

}


/* TOGGLE LKPD */

function toggleLKPD(){

lkpdBox.style.display=
media.value=="LKPD"?"block":"none"

}


/* AUTO STYLE */

function autoStyle(){

if(media.value=="Poster"||
media.value=="Infografis")

gaya.value="Flat Vector"

if(media.value=="Flashcard")

gaya.value="Cartoon Kids"

if(media.value=="Lembar Mewarnai")

gaya.value="Black White"

}


/* AUTO MATERI */

const dataMateri={

"Bahasa Indonesia":
"Fabel, Puisi, Cerita",

"Matematika":
"Penjumlahan, Pengurangan",

"IPAS":
"Siklus Air, Hewan",

"Umum":
"Literasi, Numerasi"

}

mapel.onchange=()=>{

materi.placeholder=
"Contoh: "+dataMateri[mapel.value]

}


/* GENERATE */

function generatePrompt(){

let jumlahFinal=
jumlah.value=="custom"?
(jumlahCustom.value||"10"):
jumlah.value

hasil.value=

"Create "+media.value+"\n"+
"Class: "+kelas.value+"\n"+
"Subject: "+mapel.value+"\n"+
"Topic: "+materi.value+"\n"+
"Questions: "+jumlahFinal+"\n"+
"Type: "+jenisLKPD.value+"\n"+
"Mode: "+mode.value+"\n"+
"Illustration style: "+gaya.value+"\n"+
"Use Kurikulum Merdeka\n"+
"Print ready\n"+
"300 dpi\n"+
"No watermark"

}


/* COPY */

function copyPrompt(){

hasil.select()

document.execCommand("copy")

notif.style.display="block"

setTimeout(()=>notif.style.display="none",2000)

}


/* GPT */

function openGPT(){

window.open("https://chat.openai.com")

}


/* INSTALL */

let deferredPrompt

window.addEventListener('beforeinstallprompt',(e)=>{

e.preventDefault()

deferredPrompt=e

installPopup.classList.add("show")

})


function installApp(){

if(deferredPrompt){

deferredPrompt.prompt()

}else{

alert("Install belum tersedia")

}

}


function closeInstall(){

installPopup.remove()

}


/* SERVICE WORKER */

if("serviceWorker" in navigator){

navigator.serviceWorker.register(
"service-worker.js")

}


/* COUNTER */

fetch(
"https://api.counterapi.dev/v1/pakchoyy/bantuguruyuk")

.then(res=>res.json())

.then(data=>{

visitor.innerHTML=
"Pengunjung ke: "+data.count

})

.catch(()=>{

visitor.innerHTML=
"Pengunjung ke: aktif"

})

</script>


</body>
</html>
