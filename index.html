<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Bantu Guru Yuk</title><link rel="manifest" href="manifest.json">
<link rel="icon" href="guru-cibisd2.png">
<meta name="theme-color" content="#6bbcff"><style>

body{
font-family:Segoe UI;
margin:0;
background:#eef2f7;
}

.header{
background:linear-gradient(90deg,#6fdc8c,#6bbcff);
color:white;
padding:15px;
display:flex;
align-items:center;
gap:10px;
}

.container{
max-width:720px;
margin:auto;
background:white;
padding:20px;
margin-top:20px;
border-radius:12px;
}

label{
font-weight:bold;
margin-top:12px;
display:block;
}

select,input,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
}

textarea{
min-height:180px;
resize:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

.generate{background:#4CAF50;}
.gpt{background:#00acc1;}
.gemini{background:#673ab7;}

.spinner{
display:none;
border:4px solid #eee;
border-top:4px solid #4CAF50;
border-radius:50%;
width:30px;
height:30px;
margin:auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.footer{
margin-top:40px;
background:linear-gradient(90deg,#6fdc8c,#6bbcff);
color:white;
text-align:center;
padding:20px;
}

</style></head><body><div class="header"><img src="guru-cibisd2.png" height="36"><div style="flex:1;">
BANTU GURU YUK
</div><div style="
font-size:11px;
background:#ffffff33;
padding:4px 12px;
border-radius:20px;
font-weight:bold;
">TRIAL VERSION

</div></div><div class="container"><label>Jenis Media</label>

<select id="media"
onchange="cekFormLKPD(); rekomendasiGaya();">

<option>LKPD</option>
<option>Poster</option>
<option>Infografis</option>
<option>Flashcard</option>
<option>Lembar Mewarnai</option>
<option>Bahan Bacaan</option></select><label>Kelas</label>

<select id="kelas"
onchange="updateMapel()">

<option>Umum</option><option>SD Kelas 1</option>
<option>SD Kelas 2</option>
<option>SD Kelas 3</option>
<option>SD Kelas 4</option>
<option>SD Kelas 5</option>
<option>SD Kelas 6</option><option>SMP Kelas 7</option>
<option>SMP Kelas 8</option>
<option>SMP Kelas 9</option><option>SMA Kelas 10</option>
<option>SMA Kelas 11</option>
<option>SMA Kelas 12</option></select><label>Mata Pelajaran</label>

<select id="mapel"></select>

<label>Materi</label>

<textarea id="materi"
placeholder="Contoh: Penjumlahan bilangan sampai 100">
</textarea><div id="boxLKPD"><label>Jenis LKPD</label>

<select id="jenisLKPD"><option>Pilihan Ganda</option>
<option>Isian</option>
<option>Menjodohkan</option>
<option>Tracing</option>
<option>Uraian</option>
<option>Bebas</option></select><label>Mode</label>

<select id="mode"><option>Siswa</option>
<option>Guru (Dengan Kunci Jawaban)</option></select><label>Jumlah Soal</label>

<select id="jumlah"
onchange="cekJumlahCustom()">

<option>5</option>
<option selected>10</option>
<option>15</option>
<option>20</option><option value="custom">
Isi Sendiri
</option></select><input id="jumlahCustom"
placeholder="Tulis jumlah soal"
style="display:none;">

</div><label>Ukuran</label>

<select id="ukuran"><option>A4</option>
<option>A3</option>
<option>A5</option>
<option>F4</option></select><label>Orientasi</label>

<select id="orientasi"><option>Portrait</option>
<option>Landscape</option></select><label>Gaya Ilustrasi</label>

<select id="gaya"><option>Cartoon Kids</option>
<option>Storybook Illustration</option>
<option>Flat Vector</option>
<option>Pixar Style</option>
<option>3D Clay</option>
<option>Crayon Drawing</option>
<option>Outline / Coloring</option>
<option>Comic Style</option>
<option>Infographic Vector</option>
<option>Watercolor</option></select><div class="spinner"
id="spinner"></div><button class="generate"
onclick="generatePrompt()">

Generate Prompt

</button><div style="position:relative;"><textarea id="hasil"
placeholder="Hasil prompt muncul di sini..."
style="min-height:260px;padding-right:70px;">
</textarea><button onclick="copyPrompt()"
style="
position:absolute;
top:8px;
right:8px;
background:#4CAF50;
border:none;
color:white;
padding:5px 10px;
border-radius:6px;
font-size:12px;
cursor:pointer;
">

COPY

</button></div><button class="gpt"
onclick="openGPT()">

Open ChatGPT

</button><button class="gemini"
onclick="openGemini()">

Open Gemini

</button></div><div style="text-align:center;margin-top:30px;">
Terima kasih sudah berkunjung 🤗
</div><div style="text-align:center;">
Jumlah Pengunjung 🔎
<div id="visitorCount">0</div>
</div><div class="footer">Follow me on TikTok<br>

<b>@pak.choyy</b><br>

Free and Paid Worksheet

</div><script>


const mapelData={

Umum:["Umum"],

SD:[
"Matematika",
"Bahasa Indonesia",
"IPAS",
"Pendidikan Pancasila",
"Seni Budaya",
"PJOK",
"Bahasa Inggris"
],

SMP:[
"Matematika",
"Bahasa Indonesia",
"IPA",
"IPS",
"Bahasa Inggris",
"Informatika"
],

SMA:[
"Matematika",
"Bahasa Indonesia",
"Biologi",
"Fisika",
"Kimia",
"Ekonomi",
"Sosiologi",
"Geografi"
]

};


function updateMapel(){

let k=kelas.value;

let level="Umum";

if(k.includes("SD"))level="SD";
if(k.includes("SMP"))level="SMP";
if(k.includes("SMA"))level="SMA";

mapel.innerHTML="";

mapelData[level].forEach(m=>{
mapel.innerHTML+=`<option>${m}</option>`;
});

}

updateMapel();



function cekFormLKPD(){

boxLKPD.style.display=
media.value=="LKPD"
?"block"
:"none";

}

cekFormLKPD();



function cekJumlahCustom(){

jumlahCustom.style.display=
jumlah.value=="custom"
?"block"
:"none";

}



function getFase(){

let k=kelas.value;

if(k.includes("1")||k.includes("2"))
return"Fase A";

if(k.includes("3")||k.includes("4"))
return"Fase B";

if(k.includes("5")||k.includes("6"))
return"Fase C";

if(k.includes("SMP"))
return"Fase D";

if(k.includes("10"))
return"Fase E";

if(k.includes("11")||k.includes("12"))
return"Fase F";

return"-";

}



function generatePrompt(){

spinner.style.display="block";


setTimeout(()=>{


spinner.style.display="none";


let jumlahFinal=

jumlah.value=="custom"
?jumlahCustom.value
:jumlah.value;



hasil.value=

"Create "+media.value+

"\nClass: "+kelas.value+

"\nFase: "+getFase()+

"\nSubject: "+mapel.value+

"\nTopic: "+materi.value+

"\nQuestions: "+jumlahFinal+

"\nPaper size: "+ukuran.value+

"\nOrientation: "+orientasi.value+

"\nAspect ratio: "+
(orientasi.value=="Portrait"?"3:4":"4:3")+

"\nIllustration style: "+gaya.value+

"\nLanguage: Indonesian"+

"\nUse Kurikulum Merdeka"+

"\nInclude objectives, instructions, questions, answer space"+

"\nFollow layout strictly";


hasil.scrollIntoView(
{behavior:"smooth"});


hasil.focus();


},500);

}



function copyPrompt(){

navigator.clipboard.writeText(
hasil.value);

alert("Prompt disalin");

}



function openGPT(){

window.open(
"https://chat.openai.com");

}



function openGemini(){

window.open(
"https://gemini.google.com");

}



/* visitor counter */


let v=

localStorage.getItem(
"pakchoyVisitor");


v=v?parseInt(v)+1:1;


localStorage.setItem(
"pakchoyVisitor",
v);


visitorCount.innerText=

v.toLocaleString("id-ID");



/* auto resize */


function autoResize(el){

el.style.height="auto";

el.style.height=
el.scrollHeight+"px";

}


materi.addEventListener(
"input",
()=>autoResize(materi));


hasil.addEventListener(
"input",
()=>autoResize(hasil));


</script><script>
navigator.serviceWorker.register("sw.js");
</script></body>
</html>
