<!DOCTYPE html><html lang="id">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Bantu Guru Yuk</title><link rel="manifest" href="manifest.json"><link rel="icon" href="guru-cibisd2.png"><meta name="theme-color" content="#6bbcff"><style>

body{
font-family:Segoe UI;
margin:0;
background:#eef2f7;
}


/* HEADER */

.header{

background:linear-gradient(90deg,#6fdc8c,#6bbcff);

color:white;

padding:15px;

font-size:20px;

font-weight:bold;

display:flex;

align-items:center;

gap:10px;

}


.header img{

height:38px;

}


/* CONTAINER */

.container{

max-width:720px;

margin:auto;

background:white;

padding:20px;

margin-top:20px;

border-radius:12px;

}


/* FORM */

label{

font-weight:bold;

margin-top:12px;

display:block;

}


select,input,textarea{

width:100%;

padding:10px;

margin-top:5px;

border-radius:8px;

border:1px solid #ccc;

}


textarea{

resize:none;

overflow:hidden;

min-height:120px;

}


/* BUTTON */

button{

width:100%;

padding:12px;

margin-top:10px;

border:none;

border-radius:8px;

color:white;

cursor:pointer;

font-size:14px;

}


.generate{background:#4CAF50;}

.copy{background:#2196F3;}

.gpt{background:#00acc1;}

.gemini{background:#673ab7;}


/* FOOTER */

.footer{

margin-top:40px;

background:linear-gradient(90deg,#6fdc8c,#6bbcff);

color:white;

text-align:center;

padding:22px;

}


/* TERIMA KASIH BOX */

.terima{

text-align:center;

margin-top:35px;

padding:18px;

background:#f5fbf7;

border-radius:12px;

max-width:720px;

margin-left:auto;

margin-right:auto;

}


/* COUNTER */

.counter{

text-align:center;

margin-top:25px;

color:#2e7d32;

font-size:26px;

font-weight:bold;

}

</style></head><body><div class="header"><img src="guru-cibisd2.png">BANTU GURU YUK

</div><div class="container"><label>Jenis Media</label>

<select id="media"><option>LKPD (Lembar Kerja Peserta Didik)</option><option>Poster Edukasi</option><option>Infografis</option><option>Flashcard</option><option>Lembar Mewarnai</option><option>Bahan Bacaan</option></select><label>Kelas</label>

<select id="kelas" onchange="updateMapel()"><option>Umum</option><option>SD Kelas 1</option>
<option>SD Kelas 2</option>
<option>SD Kelas 3</option><option>SMP Kelas 7</option>
<option>SMP Kelas 8</option><option>SMA Kelas 10</option></select><label>Mata Pelajaran</label>

<select id="mapel"></select>

<label>Materi</label>

<textarea id="materi"
placeholder="Tulis materi dengan jelas agar hasil lebih akurat"></textarea><label>Mode</label>

<select id="mode"><option>Siswa</option><option>Guru (Dengan Kunci Jawaban)</option></select><label>Jumlah Soal</label>

<select id="jumlah"><option>5</option><option selected>10</option><option>15</option><option>20</option></select><label>Ukuran</label>

<select id="ukuran"><option>A4</option><option>A3</option><option>A5</option><option>F4</option></select><label>Orientasi</label>

<select id="orientasi"><option>Portrait</option><option>Landscape</option></select><label>Gaya</label>

<select id="gaya"><option>Cartoon Kids (Rekomendasi)</option><option>Storybook Illustration</option><option>Flat Vector</option><option>Outline / Coloring</option></select><button class="generate"
onclick="generatePrompt()">

Generate Prompt

</button><button class="copy"
onclick="copyPrompt()">

Copy Prompt

</button><button class="gpt"
onclick="openGPT()">

Open ChatGPT

</button><button class="gemini"
onclick="openGemini()">

Open Gemini

</button><textarea id="hasil"></textarea></div><div class="terima"><div style="font-weight:bold;color:#2e7d32">Terima kasih sudah berkunjung 🤗

</div><div style="font-size:13px;color:#666;margin-top:6px;">Semoga membantu membuat media pembelajaran lebih cepat.

</div></div><div class="counter">Jumlah Pengunjung 🔎

<div id="visitorCount">0</div></div><div class="footer">Follow me on TikTok<br>

<b>@pak.choyy</b><br>

<span style="font-size:11px">Free and Paid Worksheet

</span></div><script>


const mapelData={

Umum:["Umum"],

SD:["Matematika","Bahasa Indonesia","IPAS"],

SMP:["Matematika","IPA"],

SMA:["Matematika","Biologi"]

};


function updateMapel(){

let k=kelas.value;

let level="Umum";

if(k.includes("SD"))level="SD";

if(k.includes("SMP"))level="SMP";

if(k.includes("SMA"))level="SMA";


mapel.innerHTML="";


mapelData[level].forEach(m=>{

mapel.innerHTML+=`<option>${m}</option>`;

});


}


updateMapel();


function generatePrompt(){


hasil.value=

"Create "+media.value+

"\nClass: "+kelas.value+

"\nSubject: "+mapel.value+

"\nTopic: "+materi.value+

"\nQuestions: "+jumlah.value+

"\nPaper size: "+ukuran.value+

"\nOrientation: "+orientasi.value+

"\nAspect ratio: "+(orientasi.value=="Portrait"?"3:4":"4:3")+

"\nIllustration style: "+gaya.value+

"\nLanguage: Indonesian"+

"\nUse simple language"+

"\nFollow layout strictly";


}


function copyPrompt(){

navigator.clipboard.writeText(hasil.value);

}


function openGPT(){

window.open("https://chat.openai.com");

}


function openGemini(){

window.open("https://gemini.google.com");

}


/* COUNTER PREMIUM */

let visitor = localStorage.getItem("pakchoyVisitor");

if(!visitor){

visitor=1;

}else{

visitor=parseInt(visitor)+1;

}

localStorage.setItem("pakchoyVisitor",visitor);


let start=0;

let end=visitor;


function animasiCounter(){

if(start<end){

start++;

visitorCount.innerText=

start.toLocaleString("id-ID");

setTimeout(animasiCounter,20);

}

}


animasiCounter();

</script></body></html>
