<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bantu Guru Yuk</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2f9e44">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:#eef2f7;
}

/* SPLASH */

#splash{
position:fixed;
inset:0;
background:#2f9e44;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
z-index:9999;
}

/* HEADER */

.header{
background:#2f9e44;
color:#fff;
padding:16px;
text-align:center;
}

/* NAVBAR */

.navbar{
background:#fff;
padding:12px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.navbar a{
margin:0 15px;
font-weight:bold;
cursor:pointer;
position:relative;
}

.navbar a.active::after{
content:"";
position:absolute;
left:0;
bottom:-5px;
width:100%;
height:4px;
background:gold;
border-radius:3px;
}

/* CONTAINER */

.container{
background:#fff;
margin:15px;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

label{
font-weight:bold;
margin-top:10px;
display:block;
}

select,input,textarea{
width:100%;
padding:9px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:12px;
background:#2f9e44;
color:#fff;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.copy{
background:#1971c2;
}

.section{display:none;}
.active{display:block;}

#installBox{
display:none;
position:fixed;
bottom:0;
left:0;
right:0;
background:#2f9e44;
color:#fff;
padding:15px;
text-align:center;
}

.footer{
background:#2f9e44;
color:#fff;
padding:10px;
text-align:center;
margin-top:20px;
}

</style>
</head>

<body>

<div id="splash">Bantu Guru Yuk</div>

<div class="header">
<h2>Bantu Guru Yuk</h2>
Generator Media Ajar Profesional
</div>

<div class="navbar">
<a onclick="showPage('home',event)" class="active">Home</a>
<a onclick="showPage('kontak',event)">Kontak</a>
</div>

<div id="home" class="container section active">

<label>Kelas</label>
<select id="kelas" onchange="updateMapel()">
<option>SD Kelas 1</option>
<option selected>SD Kelas 2</option>
<option>SD Kelas 3</option>
<option>SMP Kelas 7</option>
<option>SMP Kelas 8</option>
<option>SMA Kelas 10</option>
<option>SMA Kelas 11</option>
<option>SMA Kelas 12</option>
</select>

<label>Mata Pelajaran</label>
<select id="mapel"></select>

<label>Jenis Media</label>
<select id="media">
<option>LKPD</option>
<option>Poster</option>
<option>Infografis</option>
<option>Flashcard</option>
<option>Lembar Mewarnai</option>
</select>

<label>Jenis LKPD</label>
<select id="jenis" onchange="toggleInstruksi()">
<option>Pilihan Ganda</option>
<option>Isian</option>
<option>Menjodohkan</option>
<option>Uraian</option>
<option>Bebas</option>
</select>

<textarea id="instruksi" placeholder="Instruksi khusus LKPD Bebas" style="display:none"></textarea>

<label>Mode</label>
<select id="mode">
<option>Siswa</option>
<option>Guru (dengan kunci jawaban)</option>
</select>

<label>Jumlah Soal</label>
<select id="jumlah" onchange="toggleJumlah()">
<option>5</option>
<option selected>10</option>
<option>15</option>
<option>20</option>
<option value="custom">Custom</option>
</select>

<input id="jumlahCustom" placeholder="Masukkan jumlah custom" style="display:none">

<label>Materi</label>
<textarea id="materi"></textarea>

<label>Gaya Ilustrasi</label>

<select id="gaya" onchange="triggerUpload()">

<option value="Cartoon Kids — kartun ceria anak SD">
Cartoon Kids — kartun ceria anak SD
</option>

<option value="Storybook — ilustrasi buku cerita anak">
Storybook — ilustrasi buku cerita anak
</option>

<option value="Comic — gaya komik berwarna">
Comic — gaya komik berwarna
</option>

<option value="Crayon — efek gambar krayon">
Crayon — efek gambar krayon
</option>

<option value="Watercolor — cat air lembut">
Watercolor — cat air lembut
</option>

<option value="Flat Vector — infografis modern">
Flat Vector — infografis modern
</option>

<option value="3D Clay — seperti plastisin 3D">
3D Clay — seperti plastisin 3D
</option>

<option value="Pixar Style — animasi film Pixar">
Pixar Style — animasi film Pixar
</option>

<option value="Sketch — gambar pensil">
Sketch — gambar pensil
</option>

<option value="Black White — tanpa warna untuk mewarnai">
Black White — tanpa warna untuk mewarnai
</option>

<option value="UPLOAD">
Upload Referensi Sendiri
</option>

</select>

<input type="file" id="file" style="display:none">

<button onclick="generatePrompt()">Generate Prompt</button>

<textarea id="hasil"></textarea>

<button class="copy" onclick="copyPrompt()">Copy Prompt</button>

</div>

<div id="kontak" class="container section">

<button onclick="window.open('https://wa.me/6289530713597')">
WhatsApp
</button>

<button onclick="window.open('https://tiktok.com/@pak.choyy')">
TikTok
</button>

</div>

<div id="installBox">
Install aplikasi ini?
<button onclick="installApp()">INSTALL</button>
</div>

<div class="footer">
Pengunjung: <span id="counter">0</span>
</div>

<script>

setTimeout(()=>splash.style.display="none",800)

function showPage(id,e){
document.querySelectorAll(".section").forEach(x=>x.classList.remove("active"))
document.querySelectorAll(".navbar a").forEach(x=>x.classList.remove("active"))
document.getElementById(id).classList.add("active")
e.target.classList.add("active")
}

function updateMapel(){

let list=[]

if(kelas.value.includes("SD"))
list=["Bahasa Indonesia","Matematika","IPAS","Seni"]

else if(kelas.value.includes("SMP"))
list=["Bahasa Indonesia","Matematika","IPA","IPS"]

else if(kelas.value.includes("SMA"))
list=["Bahasa Indonesia","Matematika","Biologi","Fisika","Kimia"]

mapel.innerHTML=""

list.forEach(x=>{
let o=document.createElement("option")
o.text=x
mapel.add(o)
})

}

updateMapel()

function toggleInstruksi(){
instruksi.style.display=
jenis.value=="Bebas"?"block":"none"
}

function toggleJumlah(){
jumlahCustom.style.display=
jumlah.value=="custom"?"block":"none"
}

function triggerUpload(){
if(gaya.value=="UPLOAD")
file.click()
}

function generatePrompt(){

let j=
jumlah.value=="custom"?
jumlahCustom.value:
jumlah.value

let ref=
file.files.length>0?
"\nReference: "+file.files[0].name:""

hasil.value=

"Create "+media.value+
"\nClass: "+kelas.value+
"\nSubject: "+mapel.value+
"\nTopic: "+materi.value+
"\nInstruction: "+instruksi.value+
"\nQuestions: "+j+
"\nMode: "+mode.value+
"\nIllustration style: "+gaya.value+
ref+
"\nUse Kurikulum Merdeka"+
"\nLanguage: Indonesian"+
"\nPaper size: A4"+
"\nOrientation: Portrait"+
"\nProfessional layout"+
"\nHigh quality"+
"\nPrint ready"+
"\n300 dpi"+
"\nNo watermark"+
"\nIMPORTANT: Follow all instructions exactly"

}

function copyPrompt(){
hasil.select()
document.execCommand("copy")
}

fetch("https://api.counterapi.dev/v1/pakchoyy/bantuguruyuk/up")
.then(res=>res.json())
.then(data=>counter.innerText=data.count)

let deferredPrompt

window.addEventListener("beforeinstallprompt",e=>{
e.preventDefault()
deferredPrompt=e
installBox.style.display="block"
})

function installApp(){
deferredPrompt.prompt()
}

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js")
}

</script>

</body>
</html>
