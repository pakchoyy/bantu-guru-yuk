<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<title>Bantu Guru Yuk</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="icon" href="guru-cibisd2.png"><style>

body{
font-family:'Segoe UI',sans-serif;
background:#eef2f7;
margin:0;
}

.header{
background:linear-gradient(90deg,#66bb6a,#4dd0e1);
color:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
}

.trial{
background:#ffeb3b;
color:black;
padding:5px 12px;
border-radius:20px;
font-size:12px;
}

.sub{
background:linear-gradient(90deg,#81c784,#81d4fa);
color:white;
padding:10px;
text-align:center;
}

.container{
max-width:700px;
margin:25px auto;
background:white;
padding:25px;
border-radius:15px;
}

label{
font-weight:bold;
margin-top:12px;
display:block;
}

select,input,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
}

textarea{
height:200px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:8px;
color:white;
font-size:15px;
}

.generate{background:#4CAF50;}
.copy{background:#2196F3;}
.gpt{background:#009688;}
.gemini{background:#673ab7;}

.footer{
margin-top:25px;
background:linear-gradient(90deg,#66bb6a,#4dd0e1);
color:white;
padding:12px;
text-align:center;
border-radius:10px;
}

/* loading */

#loading{
position:fixed;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

.loader{
border:6px solid #eee;
border-top:6px solid #2e7d32;
border-radius:50%;
width:60px;
height:60px;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* preview style */

.styleGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:10px;
}

.styleCard{
cursor:pointer;
border:2px solid transparent;
border-radius:10px;
padding:5px;
text-align:center;
}

.styleCard.active{
border:2px solid red;
}

/* preview kertas */

#kertasBox{
width:120px;
height:160px;
border:3px solid #4dd0e1;
margin:auto;
border-radius:5px;
background:white;
}

/* preview hasil */

#previewHasil{
width:200px;
height:140px;
margin:auto;
background:linear-gradient(135deg,#e8f5e9,#e3f2fd);
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
padding:10px;
text-align:center;
margin-top:10px;
}

</style></head><body><div id="loading">
<div class="loader"></div>
<p>Memuat Bantu Guru Yuk...</p>
</div><div class="header">
<div class="logo">👩‍🏫 BANTU GURU YUK</div>
<div class="trial">TRIAL</div>
</div><div class="sub">
AI Worksheet Generator
</div><div class="container"><label>Jenis Media</label>
<select id="media">

<option>LKPD</option>
<option>Infografis</option>
<option>Poster</option>
<option>Flashcard</option>
<option>Lembar Mewarnai</option>
</select><label>Mata Pelajaran</label>
<select id="mapel">

<option>Umum</option>
<option>Matematika</option>
<option>Bahasa Indonesia</option>
<option>IPA</option>
</select><label>Materi</label>
<input id="topik" placeholder="Tulis materi dengan jelas agar hasil lebih akurat">

<label>Ukuran</label>
<select id="kertas">

<option>A4</option>
<option>F4</option>
<option>A3</option>
<option>A5</option>
</select><label>Orientasi</label>
<select id="orientasi">

<option>Portrait</option>
<option>Landscape</option>
</select><div id="kertasBox"></div>
<div id="labelKertas">A4 Portrait</div><label>Gaya</label>
<select id="gaya">

<option>Cartoon Kids</option>
<option>3D Clay</option>
<option>Pixar Style</option>
<option>Storybook</option>
</select><div id="previewHasil">Preview</div><button class="generate" onclick="generatePrompt()">Generate Prompt</button>

<textarea id="hasil"></textarea><button class="copy" onclick="copyPrompt()">Copy Prompt</button>

<button class="gpt" onclick="openGPT()">Open ChatGPT</button>

<button class="gemini" onclick="openGemini()">Open Gemini</button>

<div class="footer">
V96.4 FINAL
</div></div><script>

window.onload=function(){
loading.style.display="none";
updatePreview();
updateKertas();
}

function generatePrompt(){

hasil.value=

"Create "+media.value+"\n"+

"Subject:"+mapel.value+"\n"+

"Topic:"+topik.value+"\n"+

"Style:"+gaya.value+"\n"+

"Paper:"+kertas.value+"\n"+

"Orientation:"+orientasi.value+"\n"+

"Print ready\n300 dpi\nNo watermark\nLanguage: Indonesian";

updatePreview();

}

function copyPrompt(){

navigator.clipboard.writeText(hasil.value);

alert("Prompt disalin");

}

function openGPT(){

window.open("https://chat.openai.com");

}

function openGemini(){

window.open("https://gemini.google.com");

}

function updatePreview(){

previewHasil.innerHTML=

media.value+"<br>"+

mapel.value+"<br>"+

gaya.value+"<br>"+

kertas.value+" "+orientasi.value;

}

function updateKertas(){

labelKertas.innerText=kertas.value+" "+orientasi.value;

}

media.onchange=updatePreview;
mapel.onchange=updatePreview;
gaya.onchange=updatePreview;
kertas.onchange=updateKertas;
orientasi.onchange=updateKertas;

</script></body>
</html>
