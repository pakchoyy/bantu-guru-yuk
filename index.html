<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<title>Bantu Guru Yuk • Generator PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#eef2f7;
margin:0;
}

.header{
background:linear-gradient(90deg,#1b5e20,#2e7d32,#66bb6a);
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
font-weight:bold;
}

.container{
max-width:800px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

label{
font-weight:bold;
margin-top:12px;
display:block;
}

select,input,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

textarea{
height:260px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:8px;
color:white;
font-size:15px;
cursor:pointer;
}

.generate{background:#4CAF50;}
.copy{background:#2196F3;}
.gpt{background:#009688;}

.footer{
text-align:center;
margin-top:15px;
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<div class="header">

<div>👩‍🏫 BANTU GURU YUK</div>

<div>PRO</div>

</div>

<div class="container">

<label>Jenis Media</label>

<select id="media" onchange="cekMedia()">

<option>LKPD</option>
<option>Infografis</option>
<option>Poster</option>
<option>Flashcard</option>
<option>Lembar Mewarnai</option>

</select>

<label>Mata Pelajaran</label>

<input id="mapel">

<label>Tema / Topik / Materi</label>

<input id="topik">

<label>Jumlah Soal</label>

<select id="jumlah"></select>

<label>Tingkat Kesulitan</label>

<select id="level"></select>

<button class="generate" onclick="generatePrompt()">

Generate Prompt

</button>

<textarea id="hasil"></textarea>

<button class="copy" onclick="copyPrompt()">

Copy Prompt

</button>

<button class="gpt" onclick="openGPT()">

Open ChatGPT

</button>

<div class="footer">

by pak.choyy / 2026

</div>

</div>

<script>

// ===== RESTORE STYLE + LOGIC =====

// trial
const TRIAL=30;

let start=localStorage.getItem("trialStart");

if(!start){

localStorage.setItem("trialStart",Date.now());

start=Date.now();

}

let now=Date.now();

let days=Math.floor((now-start)/(1000*60*60*24));

let license=localStorage.getItem("license");

if(days>TRIAL && license!="active"){

document.body.innerHTML=`

<div style="padding:40px;text-align:center">

<h2>Trial Habis</h2>

<p>Lisensi Rp 25.000 Selamanya</p>

<input id="kode">

<br><br>

<button onclick="aktif()">Aktifkan</button>

</div>

`;

}

function aktif(){

if(kode.value=="PAKCHOY25"){

localStorage.setItem("license","active");

location.reload();

}else{

alert("Kode salah");

}

}



// ===== FORM =====

const mediaEl=media;
const jumlahEl=jumlah;
const levelEl=level;

function cekMedia(){

if(mediaEl.value!="LKPD"){

jumlahEl.innerHTML="<option>-</option>";

levelEl.innerHTML="<option>-</option>";

jumlahEl.disabled=true;

levelEl.disabled=true;

}else{

jumlahEl.innerHTML=`

<option>5</option>
<option selected>10</option>
<option>15</option>
<option>20</option>

`;

levelEl.innerHTML=`

<option>Mudah</option>
<option selected>Sedang</option>
<option>Sulit</option>

`;

jumlahEl.disabled=false;

levelEl.disabled=false;

}

}



// ===== PROMPT =====

function generatePrompt(){

let prompt="";

if(media.value=="LKPD"){

prompt=

"Create LKPD worksheet.\n"+

"Subject: "+mapel.value+"\n"+

"Topic: "+topik.value+"\n"+

"Questions: "+jumlah.value+"\n"+

"Difficulty: "+level.value+"\n"+

"Language: Indonesian.";

}else{

prompt=

"Create "+media.value+"\n"+

"Subject: "+mapel.value+"\n"+

"Topic: "+topik.value+"\n"+

"Language: Indonesian.";

}

hasil.value=prompt;

}



// ===== FUNCTIONS =====

function copyPrompt(){

navigator.clipboard.writeText(hasil.value);

alert("Prompt disalin");

}

function openGPT(){

window.open("https://chat.openai.com","_blank");

}

cekMedia();

</script>

</body>
</html>
