<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bantu Guru V45</title><style>

body{
font-family:Arial;
margin:0;
background:#eef2ff;
}

.header{
background:linear-gradient(135deg,#5b5bff,#8f5bff);
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
background:#6c5ce7;
color:white;
border:none;
font-weight:bold;
}

canvas{
width:100%;
background:white;
}

.download{
background:#0984e3;
}

</style></head>
<body><div class="header"><h2>Bantu Guru V45</h2>
<div>Identitas hanya untuk LKPD • by Pak.Choyy</div></div><div class="container"><div class="card"><select id="jenis"><option value="LKPD">LKPD</option>
<option value="Poster">Poster</option>
<option value="Infografis">Infografis</option></select><input id="materi" placeholder="contoh: penjumlahan 1-50"><select id="kelas"><option>Kelas 1</option>
<option selected>Kelas 2</option>
<option>Kelas 3</option></select><select id="jumlah"><option value="5">5 Soal</option>
<option value="10">10 Soal</option>
<option value="15">15 Soal</option></select><button onclick="generate()">GENERATE

</button></div><div class="card"><canvas id="canvas" width="2480" height="3508"></canvas>

<button class="download" onclick="downloadCanvas()">DOWNLOAD

</button></div></div><script>

function generate(){

let jenis=jenis.value;

let materi=materi.value;

let kelas=kelas.value;

let jumlah=parseInt(jumlah.value);


let canvas=document.getElementById("canvas");

let ctx=canvas.getContext("2d");


ctx.fillStyle="white";

ctx.fillRect(0,0,2480,3508);


ctx.fillStyle="black";


ctx.font="bold 100px Arial";

ctx.fillText(jenis,1000,200);


ctx.font="60px Arial";


ctx.fillText("Materi: "+materi,100,350);


if(jenis=="LKPD"){


ctx.fillText("Kelas: "+kelas,100,450);

ctx.fillText("Nama: ____________",100,600);

ctx.fillText("Tanggal: ____________",100,700);


ctx.fillText("Jawablah:",100,900);


for(let i=1;i<=jumlah;i++){

ctx.fillText(i+". ______________________________",100,900+i*150);

}


}


let prompt=

"ilustrasi pendidikan anak SD tentang "+materi+
", cartoon, white background";


let url=
"https://image.pollinations.ai/prompt/"+
encodeURIComponent(prompt);


let img=new Image();

img.crossOrigin="anonymous";


img.onload=function(){

ctx.drawImage(img,1400,300,900,900);

ctx.fillStyle="rgba(0,0,0,0.3)";
ctx.font="50px Arial";
ctx.fillText("by Pak.Choyy",1800,3400);

};


img.src=url;


}



function downloadCanvas(){

let canvas=document.getElementById("canvas");

let link=document.createElement("a");

link.download="PakChoyy.png";

link.href=canvas.toDataURL();

link.click();

}

</script></body>
</html>
