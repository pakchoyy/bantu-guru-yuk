<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<title>Bantu Guru Yuk • Generator v89 Stabil</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#eef2f7;
margin:0;
}

.header{
background:linear-gradient(90deg,#1b5e20,#2e7d32,#66bb6a);
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
font-weight:bold;
}

.trial{
background:#ffeb3b;
color:black;
padding:5px 12px;
border-radius:20px;
font-size:12px;
}

.container{
max-width:800px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

label{
font-weight:bold;
margin-top:12px;
display:block;
}

select,input,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

textarea{
height:260px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
color:white;
font-size:15px;
cursor:pointer;
}

.generate{background:#4CAF50;}
.copy{background:#2196F3;}
.gemini{background:#673ab7;}
.gpt{background:#009688;}

.preview{
max-width:200px;
margin-top:10px;
display:none;
border-radius:10px;
}

.footer{
text-align:center;
margin-top:15px;
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<div class="header">

<div>👩‍🏫 BANTU GURU YUK</div>

<div class="trial">TRIAL</div>

</div>

<div class="container">

<label>Jenis Media</label>

<select id="media">

<option>LKPD</option>
<option>Infografis</option>
<option>Poster</option>
<option>Flashcard</option>
<option>Lembar Mewarnai</option>

</select>

<label>Kelas</label>

<select id="kelas">

<option>Umum</option>
<option>Kelas 1</option>
<option selected>Kelas 2</option>
<option>Kelas 3</option>
<option>Kelas 4</option>
<option>Kelas 5</option>
<option>Kelas 6</option>

</select>

<label>Mata Pelajaran</label>

<input id="mapel" placeholder="contoh: IPA">

<label>Topik</label>

<input id="topik" placeholder="contoh: Siklus Air">

<label>Gaya Ilustrasi</label>

<select id="gaya" onchange="toggleUpload()">

<option>Cartoon Kids</option>
<option>3D Clay</option>
<option>Pixar Style</option>
<option>Disney Style</option>

<option value="upload">

Upload Referensi Sendiri

</option>

</select>

<div id="uploadBox" style="display:none">

<label>Upload Referensi</label>

<input type="file" id="ref" accept="image/*">

<img id="preview" class="preview">

</div>

<button type="button" class="generate" onclick="generatePrompt()">

Generate Prompt

</button>

<textarea id="hasil"></textarea>

<button type="button" class="copy" onclick="copyPrompt()">

Copy Prompt

</button>

<button type="button" class="gemini" onclick="openGemini()">

Open Gemini

</button>

<button type="button" class="gpt" onclick="openGPT()">

Open ChatGPT

</button>

<div class="footer">

v89 Stabil • No Bug • GitHub Ready

</div>

</div>

<script>



function toggleUpload(){

const gaya=document.getElementById("gaya").value;

document.getElementById("uploadBox").style.display=

(gaya==="upload")?"block":"none";

}



document.getElementById("ref").addEventListener("change",function(e){

const file=e.target.files[0];

if(file){

document.getElementById("preview").src=

URL.createObjectURL(file);

document.getElementById("preview").style.display="block";

}

});



function generatePrompt(){



const media=document.getElementById("media").value;

const kelas=document.getElementById("kelas").value;

const mapel=document.getElementById("mapel").value;

const topik=document.getElementById("topik").value;

const gaya=document.getElementById("gaya").value;



let styleText="";



if(gaya==="upload"){

styleText=`

Match illustration style exactly with uploaded reference image.

Copy colors, characters, and visual appearance.

`;

}else{

styleText=`

Illustration style: ${gaya}.

`;

}



let identity="";



if(media==="LKPD"){

identity=`

Include worksheet identity section:

School: ____________________

Student Name: ____________________

Class: ${kelas}

Subject: ${mapel}

Topic: ${topik}

`;

}



const prompt=`

Create a ${media} for elementary school students.

${identity}

Topic: ${topik}

Subject: ${mapel}



All text inside the image must be in Indonesian language.

Use simple Indonesian suitable for children.

Use clear readable fonts.

Do not overlap text and images.

Keep layout clean and professional.



${styleText}



A4 size, portrait, 300 dpi.

High quality.

Print ready.

No watermark.

`;



document.getElementById("hasil").value=prompt;



}



function copyPrompt(){

const text=document.getElementById("hasil").value;



navigator.clipboard.writeText(text)

.then(()=>alert("Prompt berhasil disalin"))

.catch(()=>alert("Copy gagal"));

}



function openGemini(){

window.open(

"https://gemini.google.com",

"_blank",

"noopener,noreferrer"

);

}



function openGPT(){

window.open(

"https://chat.openai.com",

"_blank",

"noopener,noreferrer"

);

}



</script>

</body>
</html>
