<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bantu Guru V36 PRO MAX</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f7ff;
margin:0;
padding:0;
text-align:center;
}

.header{
background: linear-gradient(135deg,#5b5bff,#8b5bff);
color:white;
padding:30px;
font-size:24px;
font-weight:bold;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.container{
background:white;
margin:20px;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

select, textarea{
width:90%;
padding:10px;
margin:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:90%;
padding:15px;
margin:10px;
border:none;
border-radius:15px;
font-size:16px;
font-weight:bold;
background: linear-gradient(135deg,#5b5bff,#8b5bff);
color:white;
}

button.gray{
background:#ddd;
color:black;
}

.preview{
width:90%;
height:500px;
margin:auto;
background:#eee;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:#999;
}

img{
max-width:100%;
border-radius:20px;
}

</style>

</head>
<body>

<div class="header">
Bantu Guru V36 PRO MAX
</div>


<div class="container">

<select id="media">

<option>LKPD</option>
<option>Poster</option>
<option>Infografis</option>
<option>Worksheet</option>

</select>


<select id="kelas">

<option>Kelas 1</option>
<option selected>Kelas 2</option>
<option>Kelas 3</option>

</select>


<select id="style">

<option>3D Clay</option>
<option>Flat Cartoon</option>
<option>Watercolor</option>

</select>


<button onclick="generatePrompt()">
Generate Prompt
</button>


<textarea id="prompt" rows="6"></textarea>


<button class="gray" onclick="copyPrompt()">
COPY PROMPT
</button>


<button class="gray" onclick="openChatGPT()">
Generate via ChatGPT
</button>


<button class="gray" onclick="openGemini()">
Generate via Gemini
</button>


<button class="gray" onclick="openBing()">
Generate via Bing
</button>


</div>


<div class="container">

<h2>Preview</h2>

<div class="preview" id="preview">

Preview A4

</div>


<button onclick="downloadImage()">
DOWNLOAD
</button>


</div>



<script>


function generatePrompt(){

let media=document.getElementById("media").value;

let kelas=document.getElementById("kelas").value;

let style=document.getElementById("style").value;


let text="Create an A4 "+media+" for "+kelas+" students, illustration style "+style+", Indonesian language, kids friendly, clean layout, high quality, 300 dpi";


document.getElementById("prompt").value=text;


document.getElementById("preview").innerHTML="Preview Ready";


}



function copyPrompt(){

let text=document.getElementById("prompt");

text.select();

document.execCommand("copy");

alert("Prompt copied");

}



function openChatGPT(){

window.open("https://chat.openai.com","_blank");

}


function openGemini(){

window.open("https://gemini.google.com","_blank");

}


function openBing(){

window.open("https://www.bing.com/images/create","_blank");

}



function downloadImage(){

let link=document.createElement("a");

link.href="https://via.placeholder.com/2480x3508.png?text=A4";

link.download="bantu-guru.jpg";

link.click();

}



</script>



</body>
</html>
