<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bantu Guru V53 PRO MAX</title>

<style>

body{
font-family:system-ui;
margin:0;
background:#f4f7ff;
}

.header{
background:linear-gradient(135deg,#5b5bff,#8b5bff);
color:white;
padding:40px 20px;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 10px 20px rgba(0,0,0,.05);
}

select,input,textarea{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.generate{
background:linear-gradient(135deg,#5b5bff,#8b5bff);
color:white;
}

.copy{
background:#00b894;
color:white;
}

.ai{
background:#eee;
}

.download{
background:#0984e3;
color:white;
}

.preview img{
width:100%;
max-width:600px;
border-radius:20px;
margin-top:10px;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="header">

<h1>Bantu Guru V53 PRO MAX</h1>

<p>Kurikulum Merdeka • A4 Fix</p>

</div>

<div class="container">

<div class="card">

<select id="media" onchange="toggleLKPD()">

<option>LKPD</option>

<option>Poster</option>

<option>Infografis</option>

<option>Worksheet</option>

</select>


<div id="identitas">

<input placeholder="Nama Sekolah">

<select>

<option>Kelas 1</option>
<option selected>Kelas 2</option>
<option>Kelas 3</option>
<option>Kelas 4</option>
<option>Kelas 5</option>
<option>Kelas 6</option>

</select>

</div>


<input id="materi" placeholder="contoh: penjumlahan 1-50">


<select id="soal">

<option>5 Soal</option>
<option>10 Soal</option>
<option>15 Soal</option>
<option>20 Soal</option>

</select>


<select id="gaya">

<option>3D Clay</option>
<option>Flat Cartoon</option>
<option>Sticker</option>
<option>Pastel</option>

</select>


<button class="generate" onclick="generate()">

GENERATE

</button>


<textarea id="prompt"></textarea>


<button class="copy" onclick="copyPrompt()">

SALIN PROMPT

</button>


<button class="ai" onclick="chatgpt()">

CHATGPT

</button>


<button class="ai" onclick="gemini()">

GEMINI

</button>


<button class="ai" onclick="bing()">

BING

</button>


</div>


<div class="card preview">

<h3>Preview</h3>

<img id="img"
src="https://via.placeholder.com/800x1131.png?text=A4">

<button class="download" onclick="download()">

DOWNLOAD

</button>

</div>


</div>


<script>

function toggleLKPD(){

let media=document.getElementById("media").value;

let id=document.getElementById("identitas");

if(media=="LKPD")

id.classList.remove("hidden");

else

id.classList.add("hidden");

}


function generate(){

let media=document.getElementById("media").value;

let materi=document.getElementById("materi").value;

let gaya=document.getElementById("gaya").value;


let prompt=

"Create A4 "+media+

" about "+materi+

", illustration "+gaya+

", Indonesian language, kids friendly, clean layout, 300 dpi";


document.getElementById("prompt").value=prompt;


document.getElementById("img").src=

"https://image.pollinations.ai/prompt/"+encodeURIComponent(prompt);

}


function copyPrompt(){

let text=document.getElementById("prompt");

text.select();

document.execCommand("copy");

alert("Prompt disalin");

}


function chatgpt(){

window.open("https://chat.openai.com");

}


function gemini(){

window.open("https://gemini.google.com");

}


function bing(){

window.open("https://bing.com/images/create");

}


function download(){

let image=document.getElementById("img").src;

let a=document.createElement("a");

a.href=image;

a.download="bantu-guru.png";

a.click();

}

</script>

</body>

</html>
