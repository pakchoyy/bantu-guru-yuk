<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<title>Generator LKPD SD v69 Final</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6fb;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
text-align:center;
}

label{
font-weight:bold;
margin-top:10px;
display:block;
}

select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
}

.output-box{
position:relative;
margin-top:15px;
}

textarea{
width:100%;
height:220px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
resize:none;
}

.copy-inside{
position:absolute;
top:10px;
right:10px;
background:#2196F3;
color:white;
border:none;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
color:white;
font-size:14px;
cursor:pointer;
}

.generate{background:#4CAF50;}
.gemini{background:#673AB7;}
.gpt{background:#009688;}

.footer{
text-align:center;
font-size:12px;
color:#888;
margin-top:10px;
}

</style>

</head>
<body>

<div class="container">

<h2>Generator Prompt LKPD SD</h2>

<label>Pilih Media</label>

<select id="media">

<option>Worksheet (LKPD)</option>
<option>Poster Edukasi</option>
<option>Flashcard</option>
<option>Lembar Mewarnai</option>
<option>Infografis</option>
<option>Kartu Soal</option>
<option>Bahan Bacaan</option>
<option>Permainan Edukasi</option>

</select>

<label>Pilih Materi</label>

<select id="materi">

<option>Penjumlahan</option>
<option>Pengurangan</option>
<option>Perkalian</option>
<option>Membaca</option>
<option>Huruf</option>
<option>Siklus Air</option>
<option>Ramadhan</option>
<option>Hewan</option>

</select>

<button class="generate" onclick="generatePrompt()">
Generate Prompt
</button>

<div class="output-box">

<textarea id="hasil" placeholder="Prompt akan muncul di sini..."></textarea>

<button class="copy-inside" onclick="copyPrompt()">
Copy
</button>

</div>

<button class="gemini" onclick="openGemini()">
Buka Gemini
</button>

<button class="gpt" onclick="openGPT()">
Buka ChatGPT
</button>

<div class="footer">
v69 Final • Generator LKPD SD
</div>

</div>

<script>

function generatePrompt(){

let media = document.getElementById("media").value;

let materi = document.getElementById("materi").value;

let prompt =

"Buatkan " + media + " untuk siswa SD kelas 2 tentang '" + materi + "'. " +

"Gunakan bahasa Indonesia sederhana, ramah anak, mudah dipahami. " +

"Tambahkan ilustrasi gaya ceria, lucu, colorful, kids friendly. " +

"Layout profesional, rapi, siap cetak, ukuran A4 portrait, resolusi tinggi 300 dpi. " +

"Gaya ilustrasi kartun pendidikan modern. " +

"Tanpa watermark. " +

"High quality.";


document.getElementById("hasil").value = prompt;

}



function copyPrompt(){

let text = document.getElementById("hasil");

text.select();

document.execCommand("copy");

alert("Prompt berhasil disalin");

}



function openGemini(){

window.open("https://gemini.google.com","_blank");

}



function openGPT(){

window.open("https://chat.openai.com","_blank");

}


</script>

</body>
</html>
