<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bantu Guru Yuk</title>

<link rel="icon" href="guru-cibisd2.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2f9e44">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:#eef2f7;
}

/* POPUP INSTALL */

.install-popup{
position:fixed;
top:-100px;
left:0;
right:0;
background:#2f9e44;
color:#fff;
padding:14px;
text-align:center;
transition:.4s;
z-index:9999;
font-weight:bold;
}

.install-popup.show{
top:0;
}

.install-popup button{
margin-left:10px;
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

/* HEADER */

.header{
background:linear-gradient(90deg,#6cc6a6,#4dabf7);
color:#fff;
padding:20px;
text-align:center;
}

.header img{
width:60px;
}

.title{
font-size:26px;
font-weight:bold;
}

.subtitle{
font-size:14px;
}

/* NAV */

.navbar{
background:#fff;
padding:12px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.navbar a{
margin:0 12px;
font-weight:bold;
cursor:pointer;
}

/* CONTAINER */

.container{
max-width:760px;
margin:auto;
background:#fff;
padding:24px;
border-radius:14px;
margin-top:20px;
}

label{
font-weight:bold;
display:block;
margin-top:14px;
}

select,input,textarea{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

textarea{
height:140px;
}

.keterangan{
font-size:12px;
color:#666;
}

/* BUTTON */

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:8px;
color:#fff;
cursor:pointer;
}

.generate{background:#2f9e44;}
.copy{background:#1971c2;}
.gpt{background:#0b7285;}
.gemini{background:#6741d9;}

/* HASIL */

.hasiljudul{
font-weight:bold;
margin-top:20px;
}

.notif{
display:none;
background:#2f9e44;
color:#fff;
padding:10px;
margin-top:10px;
border-radius:8px;
text-align:center;
}

/* SECTION */

.section{display:none;}
.active{display:block;}

/* FOOTER */

.footer{
margin-top:30px;
background:linear-gradient(90deg,#6cc6a6,#4dabf7);
padding:18px;
text-align:center;
color:#fff;
}

</style>

</head>

<body>

<!-- POPUP INSTALL -->

<div class="install-popup" id="installPopup">
Install Bantu Guru Yuk
<button onclick="installApp()">Install</button>
<button onclick="closeInstall()">Tutup</button>
</div>

<!-- HEADER -->

<div class="header">

<img src="guru-cibisd2.png">

<div class="title">
BANTU GURU YUK
</div>

<div class="subtitle">
Bantu mempermudah mengajar<br>
Berbasis Kurikulum Merdeka
</div>

</div>

<!-- NAV -->

<div class="navbar">

<a onclick="show('home')">Home</a> <a onclick="show('tentang')">Tentang</a> <a onclick="show('kontak')">Kontak</a>

</div>

<!-- HOME -->

<div id="home" class="container section active">

<label>Kelas</label>

<select id="kelas" onchange="updateMapel()">

<option>PAUD</option>
<option>TK A</option>
<option>TK B</option>
<option selected>SD Kelas 2</option>
<option>SD Kelas 3</option>
<option>SD Kelas 4</option>
<option>SD Kelas 5</option>
<option>SD Kelas 6</option>
<option>SMP Kelas 7</option>
<option>SMP Kelas 8</option>
<option>SMP Kelas 9</option>
<option>SMA Kelas 10</option>
<option>SMA Kelas 11</option>
<option>SMA Kelas 12</option>

</select>

<label>Mata Pelajaran</label> <select id="mapel"></select>

<label>Jenis Media</label>

<select id="media" onchange="toggleLKPD();autoStyle()">

<option>LKPD</option>
<option>Poster</option>
<option>Infografis</option>
<option>Flashcard</option>
<option>Lembar Mewarnai</option>

</select>

<div id="lkpdBox">

<label>Jenis LKPD</label>

<select id="jenisLKPD">

<option>Pilihan Ganda</option>
<option>Isian</option>
<option>Menjodohkan</option>
<option>Tracing</option>
<option>Uraian</option>

</select>

<label>Mode</label>

<select id="mode">

<option>Siswa</option>
<option>Guru (dengan kunci jawaban)</option>

</select>

<label>Jumlah Soal</label>

<select id="jumlah" onchange="cekJumlahCustom()">

<option>5</option>
<option selected>10</option>
<option>15</option>
<option>20</option>
<option value="custom">Isi Sendiri</option>

</select>

<input id="jumlahCustom" placeholder="Masukkan jumlah soal" style="display:none">

</div>

<label>Materi</label>

<textarea id="materi"
placeholder="Contoh: Siklus air, Penjumlahan 1–10, Cerita fabel"></textarea>

<div class="keterangan">
Tulis materi dengan jelas agar hasil akurat
</div>

<label>Gaya Ilustrasi</label>

<select id="gaya">

<option value="Cartoon Kids">Cartoon Kids — kartun ceria</option>
<option value="Storybook">Storybook — buku cerita anak</option>
<option value="Comic">Comic — komik berwarna</option>
<option value="Crayon">Crayon — seperti krayon</option>
<option value="Watercolor">Watercolor — cat air lembut</option>
<option value="Flat Vector">Flat Vector — datar / infografis</option>
<option value="3D Clay">3D Clay — plastisin 3D</option>
<option value="Pixar Style">Pixar Style — animasi film</option>
<option value="Sketch">Sketch — gambar pensil</option>
<option value="Black White">Black White — untuk mewarnai</option>

</select>

<button class="generate" onclick="generatePrompt()">
Generate Prompt
</button>

<div class="hasiljudul">
HASIL GENERATE
</div>

<textarea id="hasil"></textarea>

<button class="copy" onclick="copyPrompt()">
Copy Prompt
</button>

<div class="notif" id="notif">
Prompt berhasil disalin
</div>

<button class="gpt" onclick="openGPT()">
Open ChatGPT
</button>

<button class="gemini" onclick="openGemini()">
Open Gemini
</button>

</div>

<!-- TENTANG -->

<div id="tentang" class="container section">

Bantu mempermudah mengajar

</div>

<!-- KONTAK -->

<div id="kontak" class="container section">

WhatsApp<br><br>

+62 895-3071-3597

<br><br>

<a href="https://wa.me/6289530713597">

<button class="generate">
Chat WhatsApp
</button>

</a>

</div>

<div class="footer">

© 2026 Bantu Guru Yuk

<div id="visitor">Pengunjung: ...</div>

</div>

<script>

/* NAV */

function show(x){

document.querySelectorAll(".section")
.forEach(e=>e.classList.remove("active"))

document.getElementById(x)
.classList.add("active")

}

/* MAPEL */

function updateMapel(){

mapel.innerHTML=""

let list=["Bahasa Indonesia","Matematika","IPAS","Pancasila","Seni"]

list.forEach(x=>{

let o=document.createElement("option")
o.text=x
mapel.add(o)

})

}

updateMapel()

/* LKPD */

function toggleLKPD(){

lkpdBox.style.display=
media.value=="LKPD"?"block":"none"

}

/* CUSTOM */

function cekJumlahCustom(){

jumlahCustom.style.display=
jumlah.value=="custom"?"block":"none"

}

/* AUTO STYLE */

function autoStyle(){

if(media.value=="Poster"||media.value=="Infografis")
gaya.value="Flat Vector"

if(media.value=="Flashcard")
gaya.value="Cartoon Kids"

if(media.value=="Lembar Mewarnai")
gaya.value="Black White"

}

/* GENERATE PROMPT — FIX */

function generatePrompt(){

let jumlahFinal=
jumlah.value=="custom"?jumlahCustom.value:jumlah.value

let styleText=gaya.value

if(media.value=="Lembar Mewarnai")
styleText+=". Black and white line art, thick outline"

let prompt=

"Create "+media.value+"\n"+
"Class: "+kelas.value+"\n"+
"Subject: "+mapel.value+"\n"+
"Topic: "+materi.value+"\n"+
"Illustration style: "+styleText+"\n"+
"Questions: "+jumlahFinal+"\n"+
"Type: "+jenisLKPD.value+"\n"+
"Use Kurikulum Merdeka\n"+
"Print ready\n"+
"300 dpi\n"+
"No watermark"

hasil.value=prompt

}

/* COPY */

function copyPrompt(){

hasil.select()
document.execCommand("copy")

notif.style.display="block"

setTimeout(()=>{
notif.style.display="none"
},2000)

}

/* OPEN */

function openGPT(){
window.open("https://chat.openai.com")
}

function openGemini(){
window.open("https://gemini.google.com")
}

/* INSTALL */

let deferredPrompt

window.addEventListener('beforeinstallprompt',(e)=>{

e.preventDefault()

deferredPrompt=e

setTimeout(()=>{
installPopup.classList.add("show")
},2000)

})

function installApp(){
deferredPrompt.prompt()
}

function closeInstall(){
installPopup.classList.remove("show")
}

/* REGISTER SW */

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js")
}

/* VISITOR COUNTER */

fetch("https://api.counterapi.dev/v1/pakchoyy/bantuguruyuk/up")
.then(res=>res.json())
.then(data=>{
visitor.innerHTML="Pengunjung: "+data.count
})

</script>

</body>
</html>
