<script>

const media=document.getElementById("media");
const gaya=document.getElementById("gaya");
const jumlah=document.getElementById("jumlah");
const jumlahCustom=document.getElementById("jumlahCustom");
const hasil=document.getElementById("hasil");
const referensi=document.getElementById("referensi");
const visitor=document.getElementById("visitor");
const kelas=document.getElementById("kelas");
const mapel=document.getElementById("mapel");
const jenis=document.getElementById("jenis");
const mode=document.getElementById("mode");
const materi=document.getElementById("materi");
const notif=document.getElementById("notif");
const installPopup=document.getElementById("installPopup");

let deferredPrompt=null;

function autoStyle(){

if(media.value=="Poster")
gaya.value="Flat Vector — infografis modern";

else if(media.value=="Flashcard")
gaya.value="Cartoon Kids — kartun ceria anak SD";

else if(media.value=="Lembar Mewarnai")
gaya.value="Black White — tanpa warna";

}

function customJumlah(){

jumlahCustom.style.display=
jumlah.value=="custom"?"block":"none";

}

function generatePrompt(){

let j =
jumlah.value=="custom"
? (jumlahCustom.value || "10")
: jumlah.value;

let ref =
referensi.files.length>0
? "\nReference: "+referensi.files[0].name
: "";

hasil.value=

"Create "+media.value+

"\nClass: "+kelas.value+

"\nSubject: "+mapel.value+

"\nType: "+jenis.value+

"\nMode: "+mode.value+

"\nQuestions: "+j+

"\nTopic: "+materi.value+

"\nIllustration style: "+gaya.value+

ref+

"\nUse Kurikulum Merdeka"+

"\nLanguage: Indonesian"+

"\nPaper size: A4"+

"\nOrientation: Portrait"+

"\nProfessional layout"+

"\nHigh quality"+

"\nPrint ready"+

"\n300 dpi"+

"\nNo watermark"+

"\nIMPORTANT: Follow all instructions exactly";

}

function copyPrompt(){

hasil.select();

document.execCommand("copy");

notif.style.display="block";

setTimeout(()=>notif.style.display="none",2000);

}

function openGPT(){window.open("https://chat.openai.com");}
function openGemini(){window.open("https://gemini.google.com");}

function showSection(id,e){

document.querySelectorAll(".section").forEach(x=>x.classList.remove("active"));
document.querySelectorAll(".navbar a").forEach(x=>x.classList.remove("active"));
document.getElementById(id).classList.add("active");
e.target.classList.add("active");

}

fetch("https://api.counterapi.dev/v1/pakchoyy/bantuguruyuk/up")
.then(res=>res.json())
.then(data=>visitor.innerHTML="Total Pengunjung: "+data.count);

window.addEventListener("beforeinstallprompt",e=>{
e.preventDefault();
deferredPrompt=e;
installPopup.style.top="0";
});

function installApp(){

if(deferredPrompt){

deferredPrompt.prompt();

}else{

alert("Install belum tersedia di perangkat ini");

}

}

if("serviceWorker" in navigator)
navigator.serviceWorker.register("service-worker.js");

</script>
