<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<title>Bantu Guru Yuk</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: 'Segoe UI', sans-serif;
background:#eef2f7;
margin:0;
}

/* HEADER */

.header{
background:linear-gradient(90deg,#2e7d32,#4caf50);
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.sub{
background:#66bb6a;
color:white;
padding:8px;
text-align:center;
font-size:14px;
}

/* BOX */

.container{
max-width:700px;
margin:25px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

label{
font-weight:600;
margin-top:12px;
display:block;
}

select,input{

width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;

}

button{

width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
color:white;
font-size:15px;
cursor:pointer;

}

.generate{
background:#4CAF50;
}

.gemini{
background:#673ab7;
}

.gpt{
background:#009688;
}


/* OUTPUT */

.output{

position:relative;
margin-top:15px;

}

textarea{

width:100%;
height:180px;
padding:12px;
border-radius:10px;
border:1px solid #bbb;
font-size:13px;

}

.copy{

position:absolute;
top:8px;
right:8px;
background:#2196F3;
border:none;
color:white;
padding:4px 10px;
font-size:12px;
border-radius:6px;
cursor:pointer;

}

.footer{

text-align:center;
margin-top:15px;
font-size:12px;
color:#777;

}

</style>

</head>

<body>

<div class="header">
BANTU GURU YUK
</div>

<div class="sub">
Generator LKPD Profesional • by Pak Choy
</div>

<div class="container">

<label>Kelas</label>

<select id="kelas">

<option>Kelas 1 SD</option>
<option selected>Kelas 2 SD</option>
<option>Kelas 3 SD</option>
<option>Kelas 4 SD</option>
<option>Kelas 5 SD</option>
<option>Kelas 6 SD</option>

</select>

<label>Media</label>

<select id="media">

<option>Worksheet (LKPD)</option>
<option>Poster Edukasi</option>
<option>Flashcard</option>
<option>Lembar Mewarnai</option>
<option>Infografis</option>
<option>Kartu Soal</option>
<option>Bahan Bacaan</option>

</select>

<label>Gaya Ilustrasi</label>

<select id="gaya">

<option>Kartun Ceria</option>
<option>3D Clay</option>
<option>Flat Design</option>
<option>Komik Anak</option>
<option>Disney Style</option>
<option>Pixar Style</option>
<option>Anime Anak</option>
<option>Watercolor</option>
<option>Pastel Color</option>
<option>Hitam Putih</option>

</select>

<label>Materi (boleh ketik sendiri)</label>

<input id="materi" placeholder="Contoh: Penjumlahan 1-20">

<label>Ukuran Kertas</label>

<select id="ukuran">

<option>A4</option>
<option>A3</option>
<option>A5</option>

</select>

<label>Orientasi</label>

<select id="orientasi">

<option>Portrait</option>
<option>Landscape</option>

</select>

<button class="generate" onclick="generate()">

Generate Prompt

</button>

<div class="output">

<textarea id="hasil"></textarea>

<button class="copy" onclick="copy()">

Copy

</button>

</div>

<button class="gemini" onclick="gemini()">

Buka Gemini

</button>

<button class="gpt" onclick="gpt()">

Buka ChatGPT

</button>

<div class="footer">

v71 PRO • Estetik • Akurat

</div>

</div>

<script>



function generate(){

let kelas=kelas.value;

let media=media.value;

let gaya=gaya.value;

let materi=materi.value;

let ukuran=ukuran.value;

let orientasi=orientasi.value;



let prompt=

"Buatkan "+media+

" untuk siswa "+kelas+

" tentang '"+materi+"'. "+

"Gaya ilustrasi "+gaya+

", colorful, kids friendly. "+

"Bahasa sederhana. "+

"Layout profesional. "+

"Ukuran "+ukuran+

" "+orientasi+

", resolusi tinggi 300 dpi. "+

"Siap cetak. Tanpa watermark. "+

"High quality.";



hasil.value=prompt;

}



function copy(){

hasil.select();

document.execCommand("copy");

alert("Prompt disalin");

}



function gemini(){

window.open("https://gemini.google.com");

}



function gpt(){

window.open("https://chat.openai.com");

}



</script>

</body>
</html>
