<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<title>Bantu Guru Yuk</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#eef2f7;
margin:0;
}

.header{
background:linear-gradient(90deg,#1b5e20,#2e7d32,#66bb6a);
color:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-size:22px;
font-weight:bold;
}

.trial{
background:#ffeb3b;
color:black;
padding:5px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

.sub{
background:#66bb6a;
color:white;
padding:6px;
text-align:center;
font-size:13px;
}

.container{
max-width:700px;
margin:25px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

label{
font-weight:bold;
margin-top:12px;
display:block;
}

select,input,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
}

textarea{
height:220px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:8px;
color:white;
font-size:15px;
cursor:pointer;
}

.generate{background:#4CAF50;}
.copy{background:#2196F3;}
.gpt{background:#009688;}

.preview{
max-width:200px;
margin-top:10px;
display:none;
border-radius:10px;
}

.footer{
text-align:center;
margin-top:15px;
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<div class="header">
<div class="logo">
<span>👩‍🏫</span>
BANTU GURU YUK
</div>
<div class="trial">TRIAL</div>
</div>

<div class="sub">
AI Worksheet Generator
</div>

<div class="container">

<label>Jenis Media</label> <select id="media" onchange="cekMedia()">

<option>LKPD</option>
<option>Infografis</option>
<option>Poster</option>
<option>Flashcard</option>
<option>Lembar Mewarnai</option>
</select>

<label>Mata Pelajaran</label> <select id="mapel">

<option>Umum</option>

<option>Matematika</option>

<option>Bahasa Indonesia</option>

<option>IPA</option>

<option>IPS</option>

<option>Pendidikan Pancasila</option>

<option>Pendidikan Agama</option>

<option>Bahasa Jawa</option>

<option>Bahasa Daerah</option>

<option>Tematik</option>

</select>

<label>Tema / Topik / Materi</label> <input id="topik">

<label>Jumlah Soal</label> <select id="jumlah"></select>

<label>Tingkat Kesulitan</label> <select id="level"></select>

<label>Gaya Ilustrasi</label>

<select id="gaya" onchange="toggleUpload()">

<option>Cartoon Kids</option>

<option>3D Clay</option>

<option>Pixar Style</option>

<option>Disney Style</option>

<option>Anime Kids</option>

<option>Storybook Illustration</option>

<option>Crayon Drawing</option>

<option>Hand Drawn Kids</option>

<option value="upload">Upload Referensi Sendiri</option>

</select>

<div id="uploadBox" style="display:none">

<label>Upload Referensi</label>

<input type="file" id="ref">

<img id="preview" class="preview">

</div>

<button class="generate" onclick="generatePrompt()">
Generate Prompt
</button>

<textarea id="hasil"></textarea>

<button class="copy" onclick="copyPrompt()">
Copy Prompt
</button>

<button class="gpt" onclick="openGPT()">
Open ChatGPT
</button>

<div class="footer">
by pak.choyy / 2026
</div>

</div>

<script>

// TRIAL SYSTEM

const TRIAL=30;

let start=localStorage.getItem("trialStart");

if(!start){

localStorage.setItem("trialStart",Date.now());

start=Date.now();

}

let days=Math.floor((Date.now()-start)/(1000*60*60*24));

let license=localStorage.getItem("license");

if(days>TRIAL && license!="active"){

document.body.innerHTML=`

<div style="padding:40px;text-align:center">

<h2>Trial Habis</h2>

<p>Lisensi Rp 25.000 Selamanya</p>

<input id="kode">

<br><br>

<button onclick="aktif()">Aktifkan</button>

</div>

`;

}

function aktif(){

if(kode.value=="PAKCHOY25"){

localStorage.setItem("license","active");

location.reload();

}else{

alert("Kode salah");

}

}


// FORM LOGIC

function cekMedia(){

if(media.value!="LKPD"){

jumlah.innerHTML="<option>-</option>";

level.innerHTML="<option>-</option>";

jumlah.disabled=true;

level.disabled=true;

}else{

jumlah.innerHTML=`

<option>5</option>
<option selected>10</option>
<option>15</option>
<option>20</option>

`;

level.innerHTML=`

<option>Mudah</option>
<option selected>Sedang</option>
<option>Sulit</option>

`;

jumlah.disabled=false;

level.disabled=false;

}

}


// REFERENSI

function toggleUpload(){

uploadBox.style.display=(gaya.value=="upload")?"block":"none";

}

ref.onchange=function(e){

preview.src=URL.createObjectURL(e.target.files[0]);

preview.style.display="block";

}


// PROMPT

function generatePrompt(){

let styleText=(gaya.value=="upload")

?"Match illustration style with uploaded reference image."

:"Illustration style: "+gaya.value;

if(media.value=="LKPD"){

hasil.value=

"Create LKPD\n"+

"Subject: "+mapel.value+"\n"+

"Topic: "+topik.value+"\n"+

"Questions: "+jumlah.value+"\n"+

"Difficulty: "+level.value+"\n"+

styleText+"\n"+

"Language: Indonesian";

}else{

hasil.value=

"Create "+media.value+"\n"+

"Subject: "+mapel.value+"\n"+

"Topic: "+topik.value+"\n"+

styleText+"\n"+

"Language: Indonesian";

}

}


// BUTTON

function copyPrompt(){

navigator.clipboard.writeText(hasil.value);

alert("Prompt disalin");

}

function openGPT(){

window.open("https://chat.openai.com","_blank");

}

cekMedia();

</script>

</body>
</html>
