<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bantu Guru V40 PRO MAX</title>

<style>

body{
font-family:system-ui;
margin:0;
background:#eef2ff;
}

.header{

background:linear-gradient(135deg,#5b5bff,#8f5bff);
color:white;
padding:35px;
text-align:center;
border-radius:0 0 30px 30px;

}

.container{

padding:20px;

}

.card{

background:white;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);

}

select,input,textarea{

width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;

}

button{

width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;

}

.generate{

background:#6c5ce7;
color:white;

}

.copy{

background:#00b894;
color:white;

}

.download{

background:#0984e3;
color:white;

}

.ai{

background:#dfe6e9;

}

img{

width:100%;
margin-top:15px;
border-radius:12px;

}

.watermark{

text-align:center;
margin-top:10px;
opacity:0.5;

}

</style>

</head>

<body>

<div class="header">

<h2>Bantu Guru V40 PRO MAX</h2>

<div>Preview Instan • A4 Fix • by Pak.Choyy</div>

</div>


<div class="container">


<div class="card">

<select id="media">

<option>Poster Edukasi</option>
<option>LKPD</option>
<option>Infografis</option>

</select>


<select id="kelas">

<option>Kelas 1</option>
<option selected>Kelas 2</option>
<option>Kelas 3</option>

</select>


<input id="materi" placeholder="contoh: siklus hujan">


<select id="style">

<option>3D Clay</option>
<option>Cartoon</option>
<option>Flat</option>

</select>


<button class="generate" onclick="generatePrompt()">

Generate Prompt

</button>


<textarea id="prompt"></textarea>


<button class="copy" onclick="copyPrompt()">

Copy Prompt

</button>


<button class="ai" onclick="openChatGPT()">

Generate via ChatGPT

</button>


<button class="ai" onclick="openGemini()">

Generate via Gemini

</button>


<button class="ai" onclick="openBing()">

Generate via Bing

</button>


</div>



<div class="card">

<h3>Preview A4</h3>

<img id="preview" src="https://placehold.co/2480x3508/png?text=A4+Preview">


<div class="watermark">

by Pak.Choyy

</div>


<button class="download" onclick="downloadImage()">

Download HD

</button>


</div>



</div>



<script>


let imageURL="";



function generatePrompt(){


let media=document.getElementById("media").value;

let kelas=document.getElementById("kelas").value;

let materi=document.getElementById("materi").value;

let style=document.getElementById("style").value;



let prompt=

`Create A4 ${media} for ${kelas} about "${materi}", illustration style ${style}, colorful, Indonesian language, kids friendly, clean layout, high quality`;


document.getElementById("prompt").value=prompt;



imageURL=

"https://image.pollinations.ai/prompt/"+

encodeURIComponent(prompt);


document.getElementById("preview").src=imageURL;


}



function copyPrompt(){

let p=document.getElementById("prompt");

p.select();

document.execCommand("copy");

alert("Prompt berhasil disalin");

}



function openChatGPT(){

window.open("https://chat.openai.com");

}



function openGemini(){

window.open("https://gemini.google.com");

}



function openBing(){

window.open("https://www.bing.com/images/create");

}



async function downloadImage(){


if(!imageURL){

alert("Generate dulu");

return;

}


let res=await fetch(imageURL);

let blob=await res.blob();


let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="PakChoyy-A4.png";

a.click();


}


</script>



</body>
</html>
