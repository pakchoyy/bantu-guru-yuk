<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Bantu Guru | by pak.choyy</title><style>

body{
font-family:system-ui;
margin:0;
background:#f0fdf9;
}

.header{
background:linear-gradient(135deg,#16c79a,#00a8a8);
color:white;
padding:45px 20px;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
text-align:center;
}

.header h1{
margin:0;
font-size:32px;
}

.by{
margin-top:5px;
opacity:0.9;
}

.badge{
background:white;
color:#00a8a8;
padding:6px 14px;
border-radius:20px;
display:inline-block;
margin-top:10px;
font-size:13px;
font-weight:600;
}

.container{
padding:25px;
max-width:800px;
margin:auto;
}

.card{
background:white;
padding:22px;
border-radius:20px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

label{
font-weight:600;
font-size:14px;
}

select,input{
width:100%;
padding:13px;
margin-top:6px;
margin-bottom:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.generate{
background:linear-gradient(135deg,#16c79a,#00a8a8);
color:white;
}

.copy{
background:#10b981;
color:white;
margin-top:10px;
}

textarea{
width:100%;
height:260px;
margin-top:15px;
border-radius:12px;
padding:12px;
font-size:13px;
border:1px solid #ccc;
}

.footer{
text-align:center;
font-size:12px;
margin-top:25px;
opacity:0.6;
}

small{
opacity:0.6;
}

</style></head><body><div class="header"><h1>👨‍🏫 Bantu Guru</h1><div class="by">by pak.choyy</div><div class="badge">
Prompt Generator Media Ajar SD
</div></div><div class="container"><div class="card"><label>Jenis Media</label>

<select id="media"><option value="lkpd">Worksheet (LKPD)</option>
<option value="poster">Poster Edukasi</option>
<option value="flashcard">Flashcard</option>
<option value="mewarnai">Lembar Mewarnai</option>
<option value="infografis">Infografis</option>
<option value="kartu">Kartu Soal</option>
<option value="bacaan">Bahan Bacaan</option>
<option value="game">Permainan Edukasi</option></select><label>Kelas</label>

<select id="kelas"><option>Kelas 1</option>
<option selected>Kelas 2</option>
<option>Kelas 3</option>
<option>Kelas 4</option>
<option>Kelas 5</option>
<option>Kelas 6</option></select><small>Sesuai Kurikulum Merdeka</small>

<label>Mata Pelajaran</label>

<select id="mapel" onchange="contohMateri()"><option value="matematika">Matematika</option>
<option value="indonesia">Bahasa Indonesia</option>
<option value="ipas">IPAS</option>
<option value="pkn">Pendidikan Pancasila</option>
<option value="pai">Pendidikan Agama Islam</option>
<option value="inggris">Bahasa Inggris</option></select><label>Materi</label>

<input id="materi" placeholder="contoh: Penjumlahan 1–50"><small>Isi sesuai materi pelajaran</small>

<label>Jumlah</label>

<select id="jumlah"><option>5</option>
<option selected>10</option>
<option>15</option>
<option>20</option></select><label>Gaya Ilustrasi</label>

<select id="style"><option>3D Clay</option>
<option>Cartoon Kids</option>
<option>Kawaii Cute</option>
<option>Flat Design</option>
<option>Pastel Soft</option>
<option>Watercolor</option>
<option>Outline Coloring</option>
<option>Sticker Style</option>
<option>Vector Clean</option>
<option>Storybook Illustration</option></select><button class="generate" onclick="generatePrompt()">GENERATE PROMPT

</button><button class="copy" onclick="copyPrompt()">COPY PROMPT

</button><textarea id="hasil"></textarea></div><div class="footer">© pak.choyy

</div></div><script>

function contohMateri(){

let mapel=mapel.value;
let materi=document.getElementById("materi");

if(mapel=="matematika")
materi.placeholder="contoh: Penjumlahan 1–50";

else if(mapel=="indonesia")
materi.placeholder="contoh: Membaca kata sederhana";

else if(mapel=="ipas")
materi.placeholder="contoh: Bagian tubuh manusia";

else if(mapel=="pkn")
materi.placeholder="contoh: Aturan di rumah";

else if(mapel=="pai")
materi.placeholder="contoh: Rukun Islam";

else if(mapel=="inggris")
materi.placeholder="contoh: Fruits vocabulary";

}



function deskripsiMedia(media){

if(media=="lkpd")
return "Include student identity and answer space";

if(media=="poster")
return "Focus on visual explanation with minimal text";

if(media=="flashcard")
return "Card layout, one concept per card";

if(media=="mewarnai")
return "Black and white outline only, no color";

if(media=="infografis")
return "Combination of text and illustration";

if(media=="kartu")
return "Question card layout";

if(media=="bacaan")
return "Short reading text with illustration";

if(media=="game")
return "Fun activity or puzzle layout";

}



function generatePrompt(){

let media=media.value;
let mediaText=media.options[media.selectedIndex].text;

let kelas=kelas.value;

let materi=materi.value;

let jumlah=jumlah.value;

let style=style.value;



let prompt=

`Create an A4 ${mediaText} for ${kelas} SD students in Indonesia.

Topic: ${materi}

Requirements:

– Use Indonesian language
– Follow Kurikulum Merdeka
– ${deskripsiMedia(media)}
– Provide ${jumlah} items
– Use ${style} illustration style
– Clean layout
– Print ready
– A4 size
– 300 dpi`;


hasil.value=prompt;

}



function copyPrompt(){

hasil.select();

document.execCommand("copy");

alert("Prompt berhasil dicopy");

}

</script></body></html>
