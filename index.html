<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bantu Guru Yuk</title><style>

body{
font-family:'Segoe UI',sans-serif;
background:#eef2f7;
margin:0;
}

/* HEADER */

.header{
background:linear-gradient(90deg,#1b5e20,#2e7d32,#66bb6a);
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.trial-badge{
background:#ffeb3b;
color:#1b5e20;
padding:4px 10px;
font-size:11px;
font-weight:bold;
border-radius:12px;
}

/* SUB */

.sub{
background:#66bb6a;
color:white;
padding:6px;
text-align:center;
font-size:13px;
}

/* CONTAINER */

.container{
max-width:700px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
}

/* FORM */

label{
font-weight:bold;
display:block;
margin-top:12px;
}

select,input,textarea,button{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
}

textarea{
min-height:140px;
resize:none;
overflow:hidden;
}

button{
border:none;
color:white;
cursor:pointer;
}

.generate{background:#4CAF50;}
.copy{background:#2196F3;}
.gpt{background:#009688;}
.gemini{background:#673ab7;}

/* INFO */

.info{
margin-top:8px;
background:#e8f5e9;
border-left:4px solid #4CAF50;
padding:10px;
font-size:13px;
color:#2e7d32;
}

/* FOOTER */

.footer{
background:linear-gradient(90deg,#1b5e20,#2e7d32,#66bb6a);
color:white;
padding:22px;
text-align:center;
margin-top:30px;
}

.footer a{
color:white;
text-decoration:none;
}

.footer a:hover{
opacity:0.8;
}

</style></head><body><!-- HEADER --><div class="header"><div>👩‍🏫 BANTU GURU YUK</div><div class="trial-badge">🧪 TRIAL VERSION</div></div><div class="sub">
AI Worksheet Generator
</div><div class="container"><label>Jenis Media</label>

<select id="media" onchange="updateAll()"><option>LKPD</option>
<option>Poster</option>
<option>Infografis</option>
<option>Flashcard</option>
<option>Lembar Mewarnai</option>
<option>Bahan Bacaan</option></select><div id="mediaInfo" class="info"></div><label>Mata Pelajaran</label>

<select id="mapel"><option>Umum</option>
<option>Bahasa Indonesia</option>
<option>Matematika</option>
<option>IPAS</option>
<option>Pendidikan Pancasila</option>
<option>Seni</option></select><label>Kelas</label>

<select id="kelas"><option>Umum</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option></select><label>Materi</label>

<textarea id="materi"
placeholder="Tulis materi dengan jelas agar hasil lebih akurat"></textarea><label>Jumlah Soal</label>

<select id="jumlah" onchange="cekJumlah()"><option value="auto">Rekomendasi Pak Choyy</option>
<option>5</option>
<option selected>10</option>
<option>15</option>
<option value="custom">Isi Sendiri</option></select><input id="jumlahCustom"
type="number"
placeholder="Tulis jumlah soal"
style="display:none">

<label>Ukuran</label>

<select id="ukuran"><option>F4</option>
<option>A4</option>
<option>A3</option>
<option>A5</option></select><label>Orientasi</label>

<select id="orientasi"><option>Portrait</option>
<option>Landscape</option></select><label>Gaya Ilustrasi</label>

<select id="gaya"><option>Cartoon Kids</option>
<option>Storybook Illustration</option>
<option>Flat Vector Kids</option>
<option>Pixar Style</option>
<option>Black and White Outline</option></select><div id="rekomendasi" class="info"></div><button class="generate" onclick="generatePrompt()">
Generate Prompt
</button><textarea id="hasil"></textarea><button class="copy" onclick="copyPrompt()">
Copy Prompt
</button><button class="gpt"
onclick="window.open('https://chat.openai.com')">
Open ChatGPT
</button>

<button class="gemini"
onclick="window.open('https://gemini.google.com')">
Open Gemini
</button>

</div><!-- FOOTER FINAL --><div class="footer"><div style="font-size:12px;">
Follow me on TikTok
</div><a href="https://www.tiktok.com/@pak.choyy"
target="_blank">

<div style="font-size:18px;font-weight:bold;margin-top:4px;">
❇️ @pak.choyy
</div></a><div style="font-size:11px;margin-top:3px;">
Free and Paid Worksheet
</div></div><script>

/* AUTO EXPAND */

materi.oninput=function(){

this.style.height="auto";
this.style.height=this.scrollHeight+"px";

}


/* JUMLAH CUSTOM */

function cekJumlah(){

jumlahCustom.style.display=
jumlah.value=="custom"?"block":"none";

}


/* UPDATE AUTO */

function updateAll(){

let m=media.value;

let info={

LKPD:"📄 Lembar Kerja Peserta Didik",

Poster:"🖼️ Poster Edukasi",

Infografis:"📊 Infografis Edukasi",

Flashcard:"🗂️ Flashcard",

"Lembar Mewarnai":"🎨 Lembar Mewarnai",

"Bahan Bacaan":"📚 Bahan Bacaan"

};

mediaInfo.innerText=info[m];


let ukuranAuto={

LKPD:"F4",
Poster:"A3",
Infografis:"A4",
Flashcard:"A5",
"Lembar Mewarnai":"A4",
"Bahan Bacaan":"A4"

};

let orientasiAuto={

LKPD:"Portrait",
Poster:"Landscape",
Infografis:"Landscape",
Flashcard:"Landscape",
"Lembar Mewarnai":"Portrait",
"Bahan Bacaan":"Portrait"

};

ukuran.value=ukuranAuto[m];
orientasi.value=orientasiAuto[m];


rekomendasi.innerText=
"🤖 Rekomendasi Pak Choyy: "+
ukuran.value+" | "+
orientasi.value+" | "+
gaya.value;

}


/* GENERATE PROMPT */

function generatePrompt(){

let jumlahFinal=

jumlah.value=="custom"?
jumlahCustom.value:

jumlah.value=="auto"?
"10":
jumlah.value;


hasil.value=

"Create "+media.value+"\n"+

"Subject: "+mapel.value+"\n"+

"Class: "+kelas.value+"\n"+

"Topic: "+materi.value+"\n"+

"Questions: "+jumlahFinal+"\n"+

"Paper size: "+ukuran.value+"\n"+

"Orientation: "+orientasi.value+"\n"+

"Illustration style: "+gaya.value+"\n"+

"IMPORTANT: Strictly follow paper size and orientation.\n"+

"Use Indonesian language.\n"+

"Use child-friendly wording.\n"+

"Fix typo automatically.\n"+

"Print ready.\n"+

"300 DPI.\n"+

"No watermark.";

}


/* COPY */

function copyPrompt(){

navigator.clipboard.writeText(hasil.value);

alert("Prompt disalin");

}


updateAll();

</script></body>
</html>
