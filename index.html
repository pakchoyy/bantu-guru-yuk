<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<title>Bantu Guru Yuk - Generator LKPD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6fb;
margin:0;
}

/* HEADER */

.header{
background:#2e7d32;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.subheader{
background:#43a047;
color:white;
padding:8px;
text-align:center;
font-size:14px;
}

/* CONTAINER */

.container{
max-width:700px;
margin:20px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

label{
font-weight:bold;
margin-top:10px;
display:block;
}

select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
color:white;
font-size:14px;
cursor:pointer;
}

.generate{background:#4CAF50;}
.gemini{background:#673AB7;}
.gpt{background:#009688;}

/* OUTPUT */

.output-box{
position:relative;
margin-top:10px;
}

textarea{
width:100%;
height:200px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.copy-inside{
position:absolute;
top:10px;
right:10px;
background:#2196F3;
color:white;
border:none;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
}

.footer{
text-align:center;
font-size:12px;
margin-top:10px;
color:#777;
}

</style>

</head>

<body>

<div class="header">
BANTU GURU YUK
</div>

<div class="subheader">
Generator LKPD Semua Kelas SD • by Pak Choy
</div>

<div class="container">

<label>Kelas</label>

<select id="kelas">

<option>Kelas 1 SD</option>
<option selected>Kelas 2 SD</option>
<option>Kelas 3 SD</option>
<option>Kelas 4 SD</option>
<option>Kelas 5 SD</option>
<option>Kelas 6 SD</option>

</select>

<label>Media</label>

<select id="media">

<option>Worksheet (LKPD)</option>
<option>Poster Edukasi</option>
<option>Flashcard</option>
<option>Lembar Mewarnai</option>
<option>Infografis</option>
<option>Kartu Soal</option>

</select>

<label>Gaya Ilustrasi</label>

<select id="gaya">

<option>Kartun Ceria</option>
<option>3D Clay</option>
<option>Flat Design</option>
<option>Hitam Putih</option>
<option>Komik Anak</option>

</select>

<label>Materi</label>

<select id="materi">

<option>Membaca</option>
<option>Menulis</option>
<option>Penjumlahan</option>
<option>Pengurangan</option>
<option>Siklus Air</option>
<option>Ramadhan</option>

</select>

<button class="generate" onclick="generatePrompt()">

Generate Prompt

</button>

<div class="output-box">

<textarea id="hasil"></textarea>

<button class="copy-inside" onclick="copyPrompt()">

Copy

</button>

</div>

<button class="gemini" onclick="openGemini()">

Buka Gemini

</button>

<button class="gpt" onclick="openGPT()">

Buka ChatGPT

</button>

<div class="footer">

v70 Final • Pak Choy

</div>

</div>

<script>



function generatePrompt(){

let kelas = document.getElementById("kelas").value;

let media = document.getElementById("media").value;

let gaya = document.getElementById("gaya").value;

let materi = document.getElementById("materi").value;



let prompt =

"Buatkan " + media +

" untuk siswa " + kelas +

" tentang '" + materi + "'. " +

"Gaya ilustrasi " + gaya + ". " +

"Bahasa sederhana, ramah anak. " +

"Ukuran A4, portrait, 300 dpi, siap cetak, tanpa watermark.";



document.getElementById("hasil").value = prompt;

}



function copyPrompt(){

let text = document.getElementById("hasil");

text.select();

document.execCommand("copy");

alert("Berhasil disalin");

}



function openGemini(){

window.open("https://gemini.google.com");

}



function openGPT(){

window.open("https://chat.openai.com");

}



</script>

</body>
</html>
