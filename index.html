</style></head><body><div class="header"><div class="logo">
<img src="guru-cibisd2.png">
BANTU GURU YUK
</div><div class="subtitle">
AI Worksheet Generator MASTER PERFECT
</div><div class="trial">
FREE VERSION
</div></div><div class="navbar"><a href="#">Home</a>
<a href="#">Generator</a>
<a href="#">Kontak</a>

</div><div class="container"><label>Kelas</label>

<select id="kelas" onchange="updateMapel()"><option>PAUD</option>
<option>TK A</option>
<option>TK B</option>
<option>SD Kelas 1</option>
<option selected>SD Kelas 2</option>
<option>SD Kelas 3</option>
<option>SD Kelas 4</option>
<option>SD Kelas 5</option>
<option>SD Kelas 6</option>
<option>SMP Kelas 7</option>
<option>SMP Kelas 8</option>
<option>SMP Kelas 9</option>
<option>SMA Kelas 10</option>
<option>SMA Kelas 11</option>
<option>SMA Kelas 12</option></select><label>Mata Pelajaran</label>

<select id="mapel"></select>

<label>Jenis Media</label>

<select id="media" onchange="toggleLKPD();autoStyle()"><option>LKPD</option>
<option>Poster</option>
<option>Infografis</option>
<option>Flashcard</option>
<option>Lembar Mewarnai</option></select><div id="lkpdBox"><label>Jenis LKPD</label>

<select id="jenisLKPD"><option>Pilihan Ganda</option>
<option>Isian</option>
<option>Menjodohkan</option>
<option>Tracing</option>
<option>Uraian</option></select><label>Mode</label>

<select id="mode"><option>Siswa</option>
<option>Guru (dengan kunci jawaban)</option></select><label>Jumlah Soal</label>

<select id="jumlah" onchange="cekJumlahCustom()"><option>5</option>
<option selected>10</option>
<option>15</option>
<option>20</option>
<option value="custom">Isi Sendiri</option></select><input id="jumlahCustom" placeholder="Masukkan jumlah soal" style="display:none"></div><label>Materi</label>

<textarea id="materi"></textarea><label>Ukuran Kertas</label>

<select id="kertas"><option>A4</option>
<option>A3</option>
<option>A5</option>
<option>F4</option></select><label>Orientasi</label>

<select id="orientasi"><option>Portrait</option>
<option>Landscape</option></select><label>Gaya Ilustrasi</label>

<select id="gaya" onchange="toggleUpload()"><option>Cartoon Kids</option>
<option>Storybook</option>
<option>Comic</option>
<option>Crayon</option>
<option>Watercolor</option>
<option>Flat Vector</option>
<option>3D Clay</option>
<option>Pixar Style</option>
<option>Sketch</option>
<option>Black White</option>
<option value="upload">Upload Referensi Sendiri</option></select><input type="file" id="upload" style="display:none"><img id="preview" class="preview"><div class="spinner" id="spinner"></div><button class="generate" onclick="generatePrompt()">
Generate Prompt
</button><button class="copy" onclick="copyPrompt()">
Copy Prompt
</button><textarea id="hasil"></textarea><button class="gpt" onclick="openGPT()">
Open ChatGPT
</button><button class="gemini" onclick="openGemini()">
Open Gemini
</button></div><div class="footer">
© Bantu Guru Yuk MASTER PERFECT
</div><script>

function getFase(){

let k=kelas.value

if(k.includes("1")||k.includes("2"))return"Fase A"
if(k.includes("3")||k.includes("4"))return"Fase B"
if(k.includes("5")||k.includes("6"))return"Fase C"
if(k.includes("SMP"))return"Fase D"
if(k.includes("10"))return"Fase E"
if(k.includes("11")||k.includes("12"))return"Fase F"

return""

}


function updateMapel(){

let list=["Bahasa Indonesia","Matematika","IPAS","Pancasila","Seni"]

mapel.innerHTML=""

list.forEach(x=>{

let o=document.createElement("option")
o.text=x
mapel.add(o)

})

}

updateMapel()


function toggleLKPD(){

lkpdBox.style.display=

media.value=="LKPD"?"block":"none"

}

toggleLKPD()


function cekJumlahCustom(){

jumlahCustom.style.display=

jumlah.value=="custom"?"block":"none"

}


function toggleUpload(){

upload.style.display=

gaya.value=="upload"?"block":"none"

}


upload.onchange=e=>{

preview.src=

URL.createObjectURL(e.target.files[0])

preview.style.display="block"

}


function autoStyle(){

if(media.value=="Lembar Mewarnai")

gaya.value="Black White"

}


function generatePrompt(){

spinner.style.display="block"

setTimeout(()=>{

spinner.style.display="none"

let jumlahFinal=

jumlah.value=="custom"

?jumlahCustom.value

:jumlah.value


let styleText=

gaya.value=="upload"

?"Match EXACT style from uploaded image"

:gaya.value


if(media.value=="Lembar Mewarnai")

styleText+=". Black and white line art, thick outline, no shading."


let prompt=

"Create "+media.value+"\n"+

"Class: "+kelas.value+"\n"+

"Fase: "+getFase()+"\n"+

"Subject: "+mapel.value+"\n"+

"Topic: "+materi.value+"\n"+

"Paper size: "+kertas.value+"\n"+

"Orientation: "+orientasi.value+"\n"+

"Illustration style: "+styleText+"\n"+

"Questions: "+jumlahFinal+"\n"+

"Type: "+jenisLKPD.value+"\n"


if(mode.value.includes("Guru"))

prompt+="Include answer key\n"


prompt+=

"Use Kurikulum Merdeka\n"+

"Professional layout\n"+

"Print ready\n"+

"300 dpi\n"+

"No watermark"


hasil.value=prompt

},400)

}


function copyPrompt(){

hasil.select()
document.execCommand("copy")
alert("Prompt disalin")

}


function openGPT(){

window.open("https://chat.openai.com")

}


function openGemini(){

window.open("https://gemini.google.com")

}

</script></body>
</html>
